<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Practice</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Music Practice">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      text-align: center;
      padding: 10px;
      background-color: #333;
      color: #fff;
    }
    .tabs {
      display: flex;
      justify-content: space-around;
      background-color: #444;
      padding: 10px 0;
      overflow-x: auto;
      white-space: nowrap;
    }
    .tab {
      padding: 10px 15px;
      cursor: pointer;
      color: #ccc;
    }
    .tab.active {
      color: #fff;
      border-bottom: 2px solid #fff;
    }
    .tab-content {
      display: none;
      padding: 15px;
      flex: 1;
      overflow-y: auto;
    }
    .tab-content.active {
      display: flex;
      flex-direction: column;
    }
    .pb-details {
      background-color: #ddd;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .pb-details div {
      font-size: 14px;
      flex: 1;
      text-align: center;
    }
    .pb-controls {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .pb-controls button {
      background-color: #555;
      color: #fff;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      margin: 0 5px;
      border-radius: 3px;
    }
    .pb-controls button:hover {
      background-color: #666;
    }
    .pb-timer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
    }
    .timer-container {
      position: relative;
      width: 200px;
      height: 200px;
    }
    .timer-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      color: #333;
      font-weight: bold;
    }
    .timer-circle {
      transform: rotate(-90deg);
    }
    .timer-circle-bg {
      fill: none;
      stroke: #ddd;
      stroke-width: 10;
    }
    .timer-circle-progress {
      fill: none;
      stroke: #28a745;
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
    }
    .task-header {
      margin-bottom: 20px;
      padding: 15px;
      background-color: #ddd;
      border-radius: 5px;
    }
    .task-header h3 {
      text-align: center;
      margin: 0 0 10px 0;
      padding-bottom: 10px;
    }
    .task-header .fields {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .task-header .field {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .task-header label {
      font-size: 14px;
      margin-bottom: 5px;
    }
    .task-header input {
      padding: 8px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 3px;
      box-sizing: border-box;
    }
    textarea {
      flex: 1;
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      resize: none;
      box-sizing: border-box;
      background-color: #fff;
    }
  </style>
</head>
<body>
  <div class="header">Music Practice</div>
  <div class="tabs">
    <div class="tab active" onclick="showTab('tasks')">Tasks</div>
    <div class="tab" onclick="showTab('pb')">PB</div>
    <div class="tab" onclick="showTab('prompts')">Prompts</div>
    <div class="tab" onclick="showTab('note-pad')">Note Pad</div>
    <div class="tab" onclick="showTab('summary')">Summary</div>
    <div class="tab" onclick="showTab('rewards')">Rewards</div>
  </div>
  <div id="tasks" class="tab-content active">
    <div class="task-header">
      <h3>Practice Tasks</h3>
      <div class="fields">
        <div class="field">
          <label for="stage">Stage</label>
          <input id="stage" type="text" value="Scales">
        </div>
        <div class="field">
          <label for="date">Date</label>
          <input id="date" type="text" readonly>
        </div>
        <div class="field">
          <label for="due">Due</label>
          <input id="due" type="text" value="TBC">
        </div>
        <div class="field">
          <label for="task-time">Time</label>
          <input id="task-time" type="text" placeholder="e.g., 1:30:00 or 30 min">
        </div>
      </div>
    </div>
    <textarea id="task-notes" placeholder="Write your notes here..."></textarea>
  </div>
  <div id="pb" class="tab-content">
    <div class="pb-details">
      <div>Stage: <span id="pb-stage"></span></div>
      <div>Date: <span id="pb-date"></span></div>
      <div>Due: <span id="pb-due"></span></div>
      <div>Time: <span id="pb-time"></span></div>
    </div>
    <div class="pb-controls">
      <button onclick="startTimer()">Start</button>
      <button onclick="toggleTimer()">Pause</button>
      <button onclick="resetTimer()">Reset</button>
    </div>
    <div class="pb-timer">
      <div class="timer-container">
        <svg width="200" height="200" class="timer-circle">
          <circle class="timer-circle-bg" cx="100" cy="100" r="95"/>
          <circle id="timer-circle-progress" class="timer-circle-progress" cx="100" cy="100" r="95" stroke-dasharray="596.9" stroke-dashoffset="0"/>
        </svg>
        <div id="pb-timer" class="timer-display">00:00:00</div>
      </div>
    </div>
  </div>
  <div id="prompts" class="tab-content">
    <p>Prompts tab (placeholder)</p>
  </div>
  <div id="note-pad" class="tab-content">
    <p>Note Pad tab (placeholder)</p>
  </div>
  <div id="summary" class="tab-content">
    <p>Summary tab (placeholder)</p>
  </div>
  <div id="rewards" class="tab-content">
    <p>Rewards tab (placeholder)</p>
  </div>
  <script>
    let timer = {
      totalSeconds: 0,
      seconds: 0,
      isRunning: false,
      isPaused: false,
      interval: null
    };

    function parseTimeInput(input) {
      if (!input) return 0;
      input = input.trim().toLowerCase();
      // Handle formats: "1:30:00", "30 min", "90 seconds", "1 hour", "45"
      if (input.includes(':')) {
        const parts = input.split(':').map(n => parseInt(n));
        let hours = 0, minutes = 0, seconds = 0;
        if (parts.length === 3) {
          [hours, minutes, seconds] = parts;
        } else if (parts.length === 2) {
          [minutes, seconds] = parts;
        }
        return (isNaN(hours) ? 0 : hours * 3600) + 
               (isNaN(minutes) ? 0 : minutes * 60) + 
               (isNaN(seconds) ? 0 : seconds);
      } else if (input.includes('hour')) {
        const num = parseInt(input);
        return isNaN(num) ? 0 : num * 3600;
      } else if (input.includes('min')) {
        const num = parseInt(input);
        return isNaN(num) ? 0 : num * 60;
      } else if (input.includes('sec')) {
        const num = parseInt(input);
        return isNaN(num) ? 0 : num;
      } else {
        const num = parseInt(input);
        return isNaN(num) ? 0 : num * 60; // Assume minutes if just a number
      }
    }

    function showTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      document.querySelector(`.tab[onclick="showTab('${tabName}')"]`).classList.add('active');
      if (tabName === 'pb') {
        updatePBDetails();
        resetTimer();
      }
    }

    function updatePBDetails() {
      document.getElementById('pb-stage').textContent = document.getElementById('stage').value || 'N/A';
      document.getElementById('pb-date').textContent = document.getElementById('date').value || 'N/A';
      document.getElementById('pb-due').textContent = document.getElementById('due').value || 'N/A';
      document.getElementById('pb-time').textContent = document.getElementById('task-time').value || 'N/A';
    }

    function startTimer() {
      if (!timer.isRunning) {
        timer.totalSeconds = parseTimeInput(document.getElementById('task-time').value);
        if (timer.totalSeconds <= 0) {
          alert('Please enter a valid time in the Tasks tab (e.g., "1:30:00" or "30 min").');
          return;
        }
        timer.seconds = timer.totalSeconds;
        timer.isRunning = true;
        timer.isPaused = false;
        timer.interval = setInterval(() => {
          if (!timer.isPaused && timer.seconds > 0) {
            timer.seconds--;
            updateTimerDisplay();
            updateCircleProgress();
          }
          if (timer.seconds === 0 && timer.isRunning) {
            clearInterval(timer.interval);
            timer.isRunning = false;
            timer.interval = null;
            updateTimerDisplay();
            updateCircleProgress();
            alert('Timer finished!');
          }
        }, 1000);
        document.querySelector('.pb-controls button[onclick="toggleTimer()"]').textContent = 'Pause';
      }
    }

    function toggleTimer() {
      if (timer.isRunning) {
        timer.isPaused = !timer.isPaused;
        document.querySelector('.pb-controls button[onclick="toggleTimer()"]').textContent = timer.isPaused ? 'Resume' : 'Pause';
      }
    }

    function resetTimer() {
      clearInterval(timer.interval);
      timer.isRunning = false;
      timer.isPaused = false;
      timer.totalSeconds = parseTimeInput(document.getElementById('task-time').value);
      timer.seconds = timer.totalSeconds;
      timer.interval = null;
      updateTimerDisplay();
      updateCircleProgress();
      document.querySelector('.pb-controls button[onclick="toggleTimer()"]').textContent = 'Pause';
    }

    function updateTimerDisplay() {
      const hours = Math.floor(timer.seconds / 3600);
      const minutes = Math.floor((timer.seconds % 3600) / 60);
      const seconds = timer.seconds % 60;
      const timeStr = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      document.getElementById('pb-timer').textContent = timeStr;
    }

    function updateCircleProgress() {
      const circle = document.getElementById('timer-circle-progress');
      const circumference = 596.9; // 2 * π * radius (95)
      const progress = timer.totalSeconds ? timer.seconds / timer.totalSeconds : 1;
      const offset = circumference * (1 - progress);
      circle.setAttribute('stroke-dashoffset', offset);
    }

    // Function to format date like "April 15th"
    function formatDate() {
      const date = new Date();
      const monthNames = [
        'January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'
      ];
      const day = date.getDate();
      const suffix = (day % 10 === 1 && day !== 11) ? 'st' :
                     (day % 10 === 2 && day !== 12) ? 'nd' :
                     (day % 10 === 3 && day !== 13) ? 'rd' : 'th';
      return `${monthNames[date.getMonth()]} ${day}${suffix}`;
    }

    // Set date and timer on page load
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('date').value = formatDate();
      resetTimer();
    });
  </script>
</body>
</html>
