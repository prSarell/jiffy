<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jiffy - EF Assistant</title> <!-- Changed Title -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Jiffy"> <!-- Changed App Title -->
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      text-align: center;
      padding: 10px;
      background-color: #333;
      color: #fff;
      font-size: 1.1em; /* Slightly larger */
    }
    .tabs {
      display: flex;
      justify-content: space-around;
      background-color: #444;
      padding: 10px 0;
      overflow-x: auto;
      white-space: nowrap;
    }
    .tab {
      padding: 10px 15px;
      cursor: pointer;
      color: #ccc;
    }
    .tab.active {
      color: #fff;
      border-bottom: 2px solid #fff;
    }
    .tab-content {
      display: none;
      padding: 15px;
      flex: 1;
      overflow-y: auto;
    }
    .tab-content.active {
      display: flex;
      flex-direction: column;
    }
    .pause-btn {
      background-color: #555;
      color: #fff;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      margin-bottom: 15px;
    }

    /* --- Task Header Styling --- */
    .task-header {
      margin-bottom: 20px;
      padding: 15px;
      background-color: #ddd;
      border-radius: 5px;
    }
    .task-header h3 { /* Styling for the main task title */
      text-align: center;
      margin: 0 0 15px 0; /* More space below */
      padding-bottom: 10px;
      border-bottom: 1px solid #bbb; /* Separator line */
      font-size: 1.2em;
    }
    .task-details { /* Container for the details */
       font-size: 0.9em;
       line-height: 1.6; /* Better spacing for lines */
       text-align: center; /* Center align details */
    }
    .task-details div { /* Each detail line */
        margin-bottom: 5px; /* Space between detail lines */
    }
    .task-details strong { /* Make labels bold */
        color: #333;
        margin-right: 5px; /* Space after label */
    }
    /* --- End Task Header Styling --- */

    textarea {
      flex: 1;
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      resize: none;
      box-sizing: border-box;
      background-color: #fff;
      min-height: 150px; /* Ensure textarea has some minimum height */
    }
  </style>
</head>
<body>
  <div class="header">Jiffy</div> <!-- Changed Header -->
  <div class="tabs">
    <!-- Tab labels might need changing later, keeping for now -->
    <div class="tab active" onclick="showTab('tasks')">Tasks</div>
    <div class="tab" onclick="showTab('pb')">PB</div>
    <div class="tab" onclick="showTab('prompts')">Prompts</div>
    <div class="tab" onclick="showTab('note-pad')">Note Pad</div>
    <div class="tab" onclick="showTab('summary')">Summary</div>
    <div class="tab" onclick="showTab('rewards')">Rewards</div>
  </div>

  <!-- ****** MODIFIED TASKS TAB CONTENT ****** -->
  <div id="tasks" class="tab-content active">
    <div class="task-header">
      <h3><span id="task-name">Review Project Proposal</span></h3>
      <div class="task-details">
        <div><strong>Priority:</strong> <span id="task-priority">High</span></div>
        <div><strong>Due:</strong> <span id="task-due-date">Today, 5:00 PM</span></div>
        <div><strong>Est. Time:</strong> <span id="task-est-time">60 min</span></div>
        <!-- Timer display remains linked here -->
        <div><strong>Timer:</strong> <span id="timer-display">00:30</span></div>
      </div>
    </div>
    <textarea placeholder="Task notes, breakdown, or reflections..."></textarea>
  </div>
  <!-- ****** END MODIFIED TASKS TAB CONTENT ****** -->

  <div id="pb" class="tab-content">
    <button class="pause-btn" onclick="togglePause()">Pause</button>
    <div>Timer: <span id="pomo-timer">00:30</span></div>
    <button onclick="startTimer()">Start Timer</button>
  </div>
  <div id="prompts" class="tab-content">
    <p>Prompts tab (placeholder)</p>
  </div>
  <div id="note-pad" class="tab-content">
    <p>Note Pad tab (placeholder)</p>
  </div>
  <div id="summary" class="tab-content">
    <p>Summary tab (placeholder)</p>
  </div>
  <div id="rewards" class="tab-content">
    <p>Rewards tab (placeholder)</p>
  </div>

  <script>
    let timerSeconds = 30; // Initial timer value (seconds)
    let isPaused = false;
    let timerInterval = null;

    function showTab(tabName) {
      // Use event.currentTarget instead of event.target for reliability
      const clickedTab = event.currentTarget;
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      clickedTab.classList.add('active');
    }

    function startTimer() {
      if (!timerInterval) {
        // Ensure timer doesn't restart if already running
        isPaused = false; // Make sure it's not paused when starting
        document.querySelectorAll('.pause-btn').forEach(btn => { btn.textContent = 'Pause'; }); // Update pause button text
        updateTimerDisplay(); // Update display immediately
        timerInterval = setInterval(() => {
          if (!isPaused && timerSeconds > 0) {
            timerSeconds--;
            updateTimerDisplay();
          } else if (timerSeconds === 0) { // Stop when timer hits 0
            clearInterval(timerInterval);
            timerInterval = null;
            // Optional: Add a notification or sound here
            alert("Timer finished!"); // Simple alert for now
          }
        }, 1000);
      }
    }

    function togglePause() {
        // Only toggle if the timer is running
      if (timerInterval) {
          isPaused = !isPaused;
          document.querySelectorAll('.pause-btn').forEach(btn => {
              btn.textContent = isPaused ? 'Resume' : 'Pause';
          });
      } else if (timerSeconds > 0) {
          // If timer is not running but has time, treat toggle as start
          startTimer();
      }
    }

    function updateTimerDisplay() {
      const minutes = Math.floor(timerSeconds / 60);
      const seconds = timerSeconds % 60;
      const timeStr = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      // Update both timer displays if they exist
      const timerDisplayTask = document.getElementById('timer-display');
      const timerDisplayPomo = document.getElementById('pomo-timer');
      if (timerDisplayTask) timerDisplayTask.textContent = timeStr;
      if (timerDisplayPomo) timerDisplayPomo.textContent = timeStr;
    }

    // Initialize display on load
    document.addEventListener('DOMContentLoaded', updateTimerDisplay);

  </script>
</body>
</html>
