<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Practice</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Music Practice">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      text-align: center;
      padding: 10px;
      background-color: #333;
      color: #fff;
    }
    .tabs {
      display: flex;
      justify-content: space-around;
      background-color: #444;
      padding: 10px 0;
      overflow-x: auto;
      white-space: nowrap;
    }
    .tab {
      padding: 10px 15px;
      cursor: pointer;
      color: #ccc;
    }
    .tab.active {
      color: #fff;
      border-bottom: 2px solid #fff;
    }
    .tab-content {
      display: none;
      padding: 15px;
      flex: 1;
      overflow-y: auto;
    }
    .tab-content.active {
      display: flex;
      flex-direction: column;
    }
    .pause-btn {
      background-color: #555;
      color: #fff;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      margin-bottom: 15px;
    }
    .task-header {
      margin-bottom: 20px;
      padding: 15px;
      background-color: #ddd;
      border-radius: 5px;
    }
    .task-header h3 {
      text-align: center;
      margin: 0 0 10px 0;
      padding-bottom: 10px;
    }
    .task-header div {
      text-align: center;
    }
    textarea {
      flex: 1;
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      resize: none;
      box-sizing: border-box;
      background-color: #fff;
    }
  </style>
</head>
<body>
  <div class="header">Music Practice</div>
  <div class="tabs">
    <div class="tab active" onclick="showTab('tasks')">Tasks</div>
    <div class="tab" onclick="showTab('pb')">PB</div>
    <div class="tab" onclick="showTab('prompts')">Prompts</div>
    <div class="tab" onclick="showTab('note-pad')">Note Pad</div>
    <div class="tab" onclick="showTab('summary')">Summary</div>
    <div class="tab" onclick="showTab('rewards')">Rewards</div>
  </div>
  <div id="tasks" class="tab-content active">
    <div class="task-header">
      <h3>Bins on Thursday!!</h3>
      <div>Stage: Scales | Date: April 15th | Due: TBC | Time: <span id="timer-display">00:30</span></div>
    </div>
    <textarea placeholder="Write your notes here..."></textarea>
  </div>
  <div id="pb" class="tab-content">
    <button class="pause-btn" onclick="togglePause()">Pause</button>
    <div>Timer: <span id="pomo-timer">00:30</span></div>
    <button onclick="startTimer()">Start Timer</button>
  </div>
  <div id="prompts" class="tab-content">
    <p>Prompts tab (placeholder)</p>
  </div>
  <div id="note-pad" class="tab-content">
    <p>Note Pad tab (placeholder)</p>
  </div>
  <div id="summary" class="tab-content">
    <p>Summary tab (placeholder)</p>
  </div>
  <div id="rewards" class="tab-content">
    <p>Rewards tab (placeholder)</p>
  </div>
  <script>
    let timerSeconds = 30;
    let isPaused = false;
    let timerInterval = null;

    function showTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }

    function startTimer() {
      if (!timerInterval) {
        timerInterval = setInterval(() => {
          if (!isPaused && timerSeconds > 0) {
            timerSeconds--;
            updateTimerDisplay();
          }
          if (timerSeconds === 0) {
            clearInterval(timerInterval);
            timerInterval = null;
          }
        }, 1000);
      }
    }

    function togglePause() {
      isPaused = !isPaused;
      document.querySelectorAll('.pause-btn').forEach(btn => {
        btn.textContent = isPaused ? 'Resume' : 'Pause';
      });
    }

    function updateTimerDisplay() {
      const minutes = Math.floor(timerSeconds / 60);
      const seconds = timerSeconds % 60;
      const timeStr = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      document.getElementById('timer-display').textContent = timeStr;
      document.getElementById('pomo-timer').textContent = timeStr;
    }
  </script>
</body>
</html>
