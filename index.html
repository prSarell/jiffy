// Request notification permission
function requestNotificationPermission() {
  try {
    if (!("Notification" in window)) {
      console.log("Notifications not supported in this browser");
      alert("This browser does not support notifications. Please use a modern browser like Chrome or Safari.");
      return;
    }

    // Check current permission status
    if (Notification.permission === "granted") {
      console.log("Notification permission already granted");
      return;
    } else if (Notification.permission === "denied") {
      console.log("Notification permission previously denied");
      alert("Notification permission was denied. Please enable notifications in your browser settings and try again.");
      return;
    }

    // Request permission
    Notification.requestPermission().then(permission => {
      console.log(`Notification permission: ${permission}`);
      if (permission === "granted") {
        console.log("Notification permission granted");
        // Test notification to confirm setup
        sendPromptNotification("Notifications enabled!");
      } else {
        console.log("Notification permission denied");
        alert("Notifications are disabled. Please enable them in your browser settings to receive prompts.");
      }
    }).catch(err => {
      console.error("Error requesting notification permission:", err);
      alert("Failed to request notification permission. Please check your browser settings.");
    });
  } catch (e) {
    console.error("Error in requestNotificationPermission:", e);
  }
}

// Send a notification with the prompt
function sendPromptNotification(promptText) {
  try {
    if (!("Notification" in window)) {
      console.log("Notifications not supported in this browser");
      return;
    }

    if (Notification.permission !== "granted") {
      console.log("Notification permission not granted");
      return;
    }

    console.log(`Sending notification: ${promptText}`);
    new Notification(promptText, {
      body: "Prompt Reminder",
      icon: "icon.png",
      requireInteraction: true, // Persistent until dismissed
      tag: "jiffy-prompt", // Prevents duplicate notifications
      badge: "icon.png" // For lock screen on some devices
    });
  } catch (e) {
    console.error("Error in sendPromptNotification:", e);
    alert("Failed to send notification. Please ensure notifications are enabled.");
  }
}

// Swipe functionality to switch between categories
let touchStartX = 0;
let touchEndX = 0;
const categoryHeader = document.getElementById('category-header');

categoryHeader.addEventListener('touchstart', (e) => {
  touchStartX = e.changedTouches[0].screenX;
});

categoryHeader.addEventListener('touchend', (e) => {
  touchEndX = e.changedTouches[0].screenX;
  handleSwipe();
});

function handleSwipe() {
  const swipeThreshold = 50;
  if (touchEndX < touchStartX - swipeThreshold) {
    saveCategorySpecificData();
    currentCategoryIndex = (currentCategoryIndex + 1) % categories.length;
  } else if (touchEndX > touchStartX + swipeThreshold) {
    saveCategorySpecificData();
    currentCategoryIndex = (currentCategoryIndex - 1 + categories.length) % categories.length;
  }
  document.getElementById('category-header').textContent = categories[currentCategoryIndex];
  loadCategorySpecificData();
}

function saveCategorySpecificData() {
  try {
    const currentCategory = categories[currentCategoryIndex];
    const tasksData = {
      stage: document.getElementById('stage').value,
      date: document.getElementById('date').value,
      due: document.getElementById('due').value,
      time: document.getElementById('task-time').value,
      notes: document.getElementById('task-notes').value
    };
    const notesData = document.querySelector('#notes .notes-input').value;
    const summaryData = document.querySelector('#summary .summary-input').value;
    const categoryData = {
      tasks: tasksData,
      notes: notesData,
      summary: summaryData
    };
    let categorySpecificData = JSON.parse(localStorage.getItem('categorySpecificData')) || {};
    categorySpecificData[currentCategory] = categoryData;
    localStorage.setItem('categorySpecificData', JSON.stringify(categorySpecificData));
    console.log(`Category-specific data saved for ${currentCategory}:`, categoryData);
  } catch (e) {
    console.error('Error saving category-specific data:', e);
  }
}

function loadCategorySpecificData() {
  try {
    const currentCategory = categories[currentCategoryIndex];
    const categorySpecificData = JSON.parse(localStorage.getItem('categorySpecificData')) || {};
    const categoryData = categorySpecificData[currentCategory] || {};
    const tasksData = categoryData.tasks || {
      stage: "Scales",
      date: formatDate(),
      due: "TBC",
      time: "",
      notes: ""
    };
    const notesData = categoryData.notes || "";
    const summaryData = categoryData.summary || "";
    document.getElementById('stage').value = tasksData.stage;
    document.getElementById('date').value = tasksData.date;
    document.getElementById('due').value = tasksData.due;
    document.getElementById('task-time').value = tasksData.time;
    document.getElementById('task-notes').value = tasksData.notes;
    document.querySelector('#notes .notes-input').value = notesData;
    document.querySelector('#summary .summary-input').value = summaryData;
    updatePBDetails();
    console.log(`Category-specific data loaded for ${currentCategory}:`, categoryData);
  } catch (e) {
    console.error('Error loading category-specific data:', e);
    localStorage.removeItem('categorySpecificData');
    document.getElementById('stage').value = "Scales";
    document.getElementById('date').value = formatDate();
    document.getElementById('due').value = "TBC";
    document.getElementById('task-time').value = "";
    document.getElementById('task-notes').value = "";
    document.querySelector('#notes .notes-input').value = "";
    document.querySelector('#summary .summary-input').value = "";
    updatePBDetails();
  }
}

function saveCategories() {
  try {
    const categoriesData = {
      categories: categories,
      currentCategoryIndex: currentCategoryIndex
    };
    localStorage.setItem('categoriesData', JSON.stringify(categoriesData));
    console.log('Categories saved:', categoriesData);
  } catch (e) {
    console.error('Error saving categories:', e);
  }
}

function loadCategories() {
  try {
    const categoriesData = JSON.parse(localStorage.getItem('categoriesData')) || {};
    categories = categoriesData.categories || ['Home', 'Life', 'Work', 'School', 'Music Practice'];
    currentCategoryIndex = categoriesData.currentCategoryIndex || 4;
    if (currentCategoryIndex >= categories.length) {
      currentCategoryIndex = categories.length - 1;
    }
    document.getElementById('category-header').textContent = categories[currentCategoryIndex];
    console.log('Categories loaded:', categoriesData);
  } catch (e) {
    console.error('Error loading categories:', e);
    localStorage.removeItem('categoriesData');
    categories = ['Home', 'Life', 'Work', 'School', 'Music Practice'];
    currentCategoryIndex = 4;
    document.getElementById('category-header').textContent = categories[currentCategoryIndex];
  }
}

function addCategory() {
  const container = document.querySelector('.category-container');
  container.innerHTML = `
    <button onclick="removeCategory()">-</button>
    <input type="text" class="category-input" placeholder="Enter new category..." onblur="saveCategory(this)" onkeypress="if(event.key === 'Enter') saveCategory(this)">
    <button onclick="addCategory()">+</button>
  `;
  container.querySelector('input').focus();
}

function saveCategory(input) {
  const newCategory = input.value.trim();
  if (newCategory) {
    categories.push(newCategory);
    saveCategorySpecificData();
    currentCategoryIndex = categories.length - 1;
    saveCategories();
  }
  const container = document.querySelector('.category-container');
  container.innerHTML = `
    <button onclick="removeCategory()">-</button>
    <span id="category-header" class="category-name">${categories[currentCategoryIndex]}</span>
    <button onclick="addCategory()">+</button>
  `;
  const newCategoryHeader = document.getElementById('category-header');
  newCategoryHeader.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
  });
  newCategoryHeader.addEventListener('touchend', (e) => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
  });
  loadCategorySpecificData();
}

function removeCategory() {
  if (categories.length <= 1) {
    alert('Cannot remove the last category. At least one category is required.');
    return;
  }
  pendingDeleteIndex = currentCategoryIndex;
  const categoryName = categories[currentCategoryIndex];
  const dialog = document.getElementById('confirmationDialog');
  const message = document.getElementById('confirmationMessage');
  message.textContent = `Are you sure you want to delete '${categoryName}'?`;
  dialog.classList.add('active');
}

function confirmDeleteCategory(confirm) {
  const dialog = document.getElementById('confirmationDialog');
  dialog.classList.remove('active');
  if (confirm && pendingDeleteIndex !== null) {
    const categoryToRemove = categories[pendingDeleteIndex];
    categories.splice(pendingDeleteIndex, 1);
    currentCategoryIndex = Math.min(pendingDeleteIndex, categories.length - 1);
    if (categories.length === 0) {
      categories = ['Default'];
      currentCategoryIndex = 0;
    }
    try {
      let categorySpecificData = JSON.parse(localStorage.getItem('categorySpecificData')) || {};
      delete categorySpecificData[categoryToRemove];
      localStorage.setItem('categorySpecificData', JSON.stringify(categorySpecificData));
    } catch (e) {
      console.error('Error removing category-specific data:', e);
    }
    saveCategories();
    document.getElementById('category-header').textContent = categories[currentCategoryIndex];
    loadCategorySpecificData();
  }
  pendingDeleteIndex = null;
}

function parseTimeInput(input) {
  if (!input) return 0;
  input = input.trim().toLowerCase();
  if (input.includes(':')) {
    const parts = input.split(':').map(n => parseInt(n));
    let minutes = 0, seconds = 0;
    if (parts.length === 2) {
      [minutes, seconds] = parts;
    }
    return (isNaN(minutes) ? 0 : minutes * 60) + (isNaN(seconds) ? 0 : seconds);
  } else {
    const num = parseInt(input);
    return isNaN(num) ? 0 : num;
  }
}

function showTab(tabName) {
  console.log(`Switching to tab: ${tabName}`);
  try {
    document.querySelectorAll('.tab-content').forEach(content => {
      content.classList.remove('active');
      console.log(`Deactivating content: ${content.id}`);
    });
    document.querySelectorAll('.tab').forEach(tab => {
      tab.classList.remove('active');
      console.log(`Deactivating tab: ${tab.textContent}`);
    });
    const targetContent = document.getElementById(tabName);
    const targetTab = document.querySelector(`.tab[onclick="showTab('${tabName}')"]`);
    if (targetContent && targetTab) {
      targetContent.classList.add('active');
      targetTab.classList.add('active');
      console.log(`Activated tab: ${tabName}`);
    } else {
      console.error(`Tab or content not found for: ${tabName}`);
      showTab('pb');
    }
    if (tabName === 'pb') {
      updatePBDetails();
      resetTimer();
    }
  } catch (e) {
    console.error('Error in showTab:', e);
  }
}

function updatePBDetails() {
  try {
    document.getElementById('pb-stage').textContent = document.getElementById('stage').value || 'N/A';
    document.getElementById('pb-date').textContent = document.getElementById('date').value || 'N/A';
    document.getElementById('pb-due').textContent = document.getElementById('due').value || 'N/A';
    document.getElementById('pb-time').textContent = document.getElementById('task-time').value || 'N/A';
  } catch (e) {
    console.error('Error in updatePBDetails:', e);
  }
}

function toggleStartPause() {
  try {
    if (!timer.isRunning) {
      timer.totalSeconds = parseTimeInput(document.getElementById('task-time').value);
      if (timer.totalSeconds <= 0) {
        alert('Please enter a valid time in the Tasks tab (e.g., "1:30:00" or "30 min").');
        return;
      }
      timer.seconds = timer.totalSeconds;
      timer.isRunning = true;
      timer.isPaused = false;
      timer.interval = setInterval(() => {
        if (!timer.isPaused) {
          timer.seconds--;
          updateTimerDisplay();
          updateCircleProgress();
        }
      }, 1000);
      document.getElementById('start-pause-btn').textContent = 'Pause';
    } else {
      timer.isPaused = !timer.isPaused;
      document.getElementById('start-pause-btn').textContent = timer.isPaused ? 'Resume' : 'Pause';
    }
  } catch (e) {
    console.error('Error in toggleStartPause:', e);
  }
}

function completeTimer() {
  try {
    clearInterval(timer.interval);
    timer.isRunning = false;
    timer.isPaused = false;
    if (timer.seconds > 0) {
      const rewards = getRewards();
      if (rewards.length > 0) {
        const randomIndex = Math.floor(Math.random() * rewards.length);
        const reward = rewards[randomIndex];
        showRewardPopup(reward);
      }
    }
    timer.seconds = timer.totalSeconds;
    timer.interval = null;
    updateTimerDisplay();
    updateCircleProgress();
    document.getElementById('start-pause-btn').textContent = 'Start';
    const stage = document.getElementById('pb-stage').textContent;
    const date = document.getElementById('pb-date').textContent;
    const due = document.getElementById('pb-due').textContent;
    const time = document.getElementById('pb-time').textContent;
    const summaryEntry = `Completed Task - Stage: ${stage}, Date: ${date}, Due: ${due}, Time: ${time}\n`;
    const summaryTextarea = document.querySelector('#summary .summary-input');
    summaryTextarea.value = (summaryTextarea.value ? summaryTextarea.value + '\n' : '') + summaryEntry;
    saveCategorySpecificData();
  } catch (e) {
    console.error('Error in completeTimer:', e);
  }
}

function resetTimer() {
  try {
    clearInterval(timer.interval);
    timer.isRunning = false;
    timer.isPaused = false;
    timer.totalSeconds = parseTimeInput(document.getElementById('task-time').value);
    timer.seconds = timer.totalSeconds;
    timer.interval = null;
    updateTimerDisplay();
    updateCircleProgress();
    document.getElementById('start-pause-btn').textContent = 'Start';
  } catch (e) {
    console.error('Error in resetTimer:', e);
  }
}

function updateTimerDisplay() {
  try {
    const absSeconds = Math.abs(timer.seconds);
    const hours = Math.floor(absSeconds / 3600);
    const minutes = Math.floor((absSeconds % 3600) / 60);
    const seconds = absSeconds % 60;
    const timeStr = `${timer.seconds < 0 ? '-' : ''}${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    document.getElementById('pb-timer').textContent = timeStr;
  } catch (e) {
    console.error('Error in updateTimerDisplay:', e);
  }
}

function updateCircleProgress() {
  try {
    const circle = document.getElementById('timer-circle-progress');
    const circumference = 596.9;
    let progress = timer.totalSeconds ? timer.seconds / timer.totalSeconds : 1;
    if (progress < 0) {
      progress = 0;
      circle.classList.add('overdue');
    } else {
      circle.classList.remove('overdue');
    }
    const offset = -circumference * (1 - progress);
    circle.setAttribute('stroke-dashoffset', offset);
  } catch (e) {
    console.error('Error in updateCircleProgress:', e);
  }
}

function formatDate() {
  try {
    const date = new Date();
    const monthNames = [
      'January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'
    ];
    const day = date.getDate();
    const suffix = (day % 10 === 1 && day !== 11) ? 'st' :
                   (day % 10 === 2 && day !== 12) ? 'nd' :
                   (day % 10 === 3 && day !== 13) ? 'rd' : 'th';
    return `${monthNames[date.getMonth()]} ${day}${suffix}`;
  } catch (e) {
    console.error('Error in formatDate:', e);
    return '';
  }
}

// Prompt Display Functions
function getPrompts() {
  try {
    const promptItems = document.querySelectorAll('#prompts-list .prompt-item');
    const prompts = [];
    promptItems.forEach(item => {
      const text = item.querySelector('span').textContent;
      const isImportant = item.classList.contains('important');
      prompts.push({ text, isImportant });
    });
    return prompts;
  } catch (e) {
    console.error('Error in getPrompts:', e);
    return [];
  }
}

function displayRandomPrompt() {
  try {
    const prompts = getPrompts();
    if (prompts.length === 0) {
      document.getElementById('promptDisplay').textContent = '';
      return;
    }
    const randomIndex = Math.floor(Math.random() * prompts.length);
    const prompt = prompts[randomIndex];
    const display = document.getElementById('promptDisplay');
    display.textContent = prompt.text;
    if (prompt.isImportant) {
      display.classList.add('important');
    } else {
      display.classList.remove('important');
    }
    // Send notification regardless of visibility
    sendPromptNotification(prompt.text);
    const intervalInput = document.getElementById('refresh-interval').value;
    let intervalSeconds = parseTimeInput(intervalInput);
    if (intervalSeconds <= 0) intervalSeconds = 30;
    const intervalMs = intervalSeconds * 1000;
    const displayDuration = prompt.isImportant ? intervalMs * 1.5 : intervalMs;
    setTimeout(displayRandomPrompt, displayDuration);
  } catch (e) {
    console.error('Error in displayRandomPrompt:', e);
  }
}

function populatePrompts(prompts) {
  try {
    const list = document.getElementById('prompts-list');
    list.innerHTML = '';
    prompts.forEach((prompt, index) => {
      const promptDiv = document.createElement('div');
      promptDiv.className = 'prompt-item';
      if (prompt.isImportant) {
        promptDiv.classList.add('important');
      }
      promptDiv.innerHTML = `
        <span ondblclick="editPrompt(this)">${prompt.text}</span>
        <input type="checkbox" id="important-${index}" ${prompt.isImportant ? 'checked' : ''} onchange="toggleImportant(this)">
        <label for="important-${index}">Important</label>
        <button onclick="deletePrompt(this)">Delete</button>
      `;
      list.appendChild(promptDiv);
    });
  } catch (e) {
    console.error('Error in populatePrompts:', e);
  }
}

function showAddPromptInput() {
  try {
    const list = document.getElementById('prompts-list');
    const inputDiv = document.createElement('div');
    inputDiv.className = 'prompt-item';
    inputDiv.innerHTML = `
      <input type="text" placeholder="Enter new prompt..." onblur="addPrompt(this)" onkeypress="if(event.key === 'Enter') addPrompt(this)">
    `;
    list.insertBefore(inputDiv, list.firstChild);
    inputDiv.querySelector('input').focus();
  } catch (e) {
    console.error('Error in showAddPromptInput:', e);
  }
}

function addPrompt(input) {
  try {
    const text = input.value.trim();
    if (text) {
      promptCounter++;
      const promptDiv = document.createElement('div');
      promptDiv.className = 'prompt-item';
      promptDiv.innerHTML = `
        <span ondblclick="editPrompt(this)">${text}</span>
        <input type="checkbox" id="important-${promptCounter}" onchange="toggleImportant(this)">
        <label for="important-${promptCounter}">Important</label>
        <button onclick="deletePrompt(this)">Delete</button>
      `;
      input.parentElement.replaceWith(promptDiv);
      saveGlobalData();
    } else {
      input.parentElement.remove();
    }
  } catch (e) {
    console.error('Error in addPrompt:', e);
  }
}

function editPrompt(span) {
  try {
    const promptItem = span.parentElement;
    const currentText = span.textContent;
    const isImportant = promptItem.classList.contains('important');
    const checkboxId = promptItem.querySelector('input[type="checkbox"]').id;
    promptItem.innerHTML = `
      <input type="text" value="${currentText}" onblur="savePromptEdit(this)" onkeypress="if(event.key === 'Enter') savePromptEdit(this)">
      <input type="checkbox" id="${checkboxId}" ${isImportant ? 'checked' : ''} onchange="toggleImportant(this)">
      <label for="${checkboxId}">Important</label>
      <button onclick="deletePrompt(this)">Delete</button>
    `;
    promptItem.querySelector('input[type="text"]').focus();
  } catch (e) {
    console.error('Error in editPrompt:', e);
  }
}

function savePromptEdit(input) {
  try {
    const promptItem = input.parentElement;
    const newText = input.value.trim();
    const isImportant = promptItem.classList.contains('important');
    const checkboxId = promptItem.querySelector('input[type="checkbox"]').id;
    if (newText) {
      promptItem.innerHTML = `
        <span ondblclick="editPrompt(this)">${newText}</span>
        <input type="checkbox" id="${checkboxId}" ${isImportant ? 'checked' : ''} onchange="toggleImportant(this)">
        <label for="${checkboxId}">Important</label>
        <button onclick="deletePrompt(this)">Delete</button>
      `;
      if (isImportant) {
        promptItem.classList.add('important');
      }
      saveGlobalData();
    } else {
      promptItem.remove();
      saveGlobalData();
    }
  } catch (e) {
    console.error('Error in savePromptEdit:', e);
  }
}

function toggleImportant(checkbox) {
  try {
    const promptItem = checkbox.parentElement;
    if (checkbox.checked) {
      promptItem.classList.add('important');
    } else {
      promptItem.classList.remove('important');
    }
    saveGlobalData();
  } catch (e) {
    console.error('Error in toggleImportant:', e);
  }
}

function deletePrompt(button) {
  try {
    button.parentElement.remove();
    saveGlobalData();
  } catch (e) {
    console.error('Error in deletePrompt:', e);
  }
}

// Rewards Tab Functions
function getRewards() {
  try {
    const rewardItems = document.querySelectorAll('#rewards-list .reward-item');
    const rewards = [];
    rewardItems.forEach(item => {
      const text = item.querySelector('span').textContent;
      rewards.push(text);
    });
    return rewards;
  } catch (e) {
    console.error('Error in getRewards:', e);
    return [];
  }
}

function populateRewards(rewards) {
  try {
    const list = document.getElementById('rewards-list');
    list.innerHTML = '';
    rewards.forEach((reward, index) => {
      const rewardDiv = document.createElement('div');
      rewardDiv.className = 'reward-item';
      rewardDiv.innerHTML = `
        <span ondblclick="editReward(this)">${reward}</span>
        <button onclick="deleteReward(this)">Delete</button>
      `;
      list.appendChild(rewardDiv);
    });
  } catch (e) {
    console.error('Error in populateRewards:', e);
  }
}

function showAddRewardInput() {
  try {
    const list = document.getElementById('rewards-list');
    const inputDiv = document.createElement('div');
    inputDiv.className = 'reward-item';
    inputDiv.innerHTML = `
      <input type="text" placeholder="Enter new reward..." onblur="addReward(this)" onkeypress="if(event.key === 'Enter') addReward(this)">
    `;
    list.insertBefore(inputDiv, list.firstChild);
    inputDiv.querySelector('input').focus();
  } catch (e) {
    console.error('Error in showAddRewardInput:', e);
  }
}

function addReward(input) {
  try {
    const text = input.value.trim();
    if (text) {
      rewardCounter++;
      const rewardDiv = document.createElement('div');
      rewardDiv.className = 'reward-item';
      rewardDiv.innerHTML = `
        <span ondblclick="editReward(this)">${text}</span>
        <button onclick="deleteReward(this)">Delete</button>
      `;
      input.parentElement.replaceWith(rewardDiv);
      saveGlobalData();
    } else {
      input.parentElement.remove();
    }
  } catch (e) {
    console.error('Error in addReward:', e);
  }
}

function editReward(span) {
  try {
    const rewardItem = span.parentElement;
    const currentText = span.textContent;
    rewardItem.innerHTML = `
      <input type="text" value="${currentText}" onblur="saveRewardEdit(this)" onkeypress="if(event.key === 'Enter') saveRewardEdit(this)">
      <button onclick="deleteReward(this)">Delete</button>
    `;
    rewardItem.querySelector('input[type="text"]').focus();
  } catch (e) {
    console.error('Error in editReward:', e);
  }
}

function saveRewardEdit(input) {
  try {
    const rewardItem = input.parentElement;
    const newText = input.value.trim();
    if (newText) {
      rewardItem.innerHTML = `
        <span ondblclick="editReward(this)">${newText}</span>
        <button onclick="deleteReward(this)">Delete</button>
      `;
      saveGlobalData();
    } else {
      rewardItem.remove();
      saveGlobalData();
    }
  } catch (e) {
    console.error('Error in saveRewardEdit:', e);
  }
}

function deleteReward(button) {
  try {
    button.parentElement.remove();
    saveGlobalData();
  } catch (e) {
    console.error('Error in deleteReward:', e);
  }
}

// Add event listeners for saving category-specific data on input changes
function addSaveEventListeners() {
  try {
    document.getElementById('stage').addEventListener('input', saveCategorySpecificData);
    document.getElementById('date').addEventListener('input', saveCategorySpecificData);
    document.getElementById('due').addEventListener('input', saveCategorySpecificData);
    document.getElementById('task-time').addEventListener('input', saveCategorySpecificData);

    document.querySelector('#notes .notes-input').addEventListener('input', saveCategorySpecificData);
    document.querySelector('#summary .summary-input').addEventListener('input', saveCategorySpecificData);
  } catch (e) {
    console.error('Error in addSaveEventListeners:', e);
  }
}
