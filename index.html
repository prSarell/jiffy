<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jiffy</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Jiffy">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Arial', sans-serif;
      background-color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      font-size: 14px;
      color: #fff;
    }
    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 15px;
      background-color: #000;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 500;
    }
    .header .category-container {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .header .category-name {
      display: inline-block;
      touch-action: pan-y;
    }
    .header .category-input {
      padding: 3px;
      font-size: 1rem;
      border: 1px solid #555;
      border-radius: 3px;
      background-color: #444;
      color: #fff;
      width: 200px;
    }
    .header button {
      background: none;
      border: none;
      color: #999;
      font-size: 1.5rem;
      padding: 5px 8px;
      cursor: pointer;
    }
    .header button:hover {
      color: #fff;
    }
    .prompt-display {
      background-color: #000;
      padding: 8px 15px;
      text-align: center;
      font-weight: bold;
      font-size: 0.9rem;
      color: #fff;
      border-bottom: 1px solid #333;
    }
    .prompt-display.important {
      color: #28a745;
    }
    .tabs {
      display: flex;
      background-color: #000;
      padding: 6px 0;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      border-bottom: 1px solid #333;
      position: relative;
      z-index: 1;
    }
    .tab {
      padding: 6px 10px;
      cursor: pointer;
      color: #999;
      font-size: 0.85rem;
      flex: 1;
      text-align: center;
      min-width: 55px;
      transition: color 0.2s ease;
    }
    .tab.active {
      color: #fff;
      border-bottom: 2px solid #fff;
    }
    .tab-content {
      display: none;
      padding: 10px;
      flex: 1;
      overflow-y: auto;
      background-color: #1a1a1a;
    }
    .tab-content.active {
      display: flex;
      flex-direction: column;
    }
    .pb-details, .prompts-header, .rewards-header {
      background-color: #333;
      padding: 6px;
      border-radius: 5px;
      margin-bottom: 8px;
      font-size: 0.8rem;
      color: #ccc;
    }
    .pb-details {
      display: flex;
      flex-wrap: nowrap;
      gap: 10px;
      justify-content: space-between;
    }
    .pb-details div {
      flex: 0 0 auto;
      text-align: left;
    }
    .pb-controls {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
      gap: 6px;
    }
    .pb-controls button, .prompts-header button, .rewards-header button {
      background-color: #444;
      color: #fff;
      border: none;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 5px;
      font-size: 0.85rem;
      touch-action: manipulation;
    }
    .pb-controls button:hover, .prompts-header button:hover, .rewards-header button:hover {
      background-color: #555;
    }
    .pb-timer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
    }
    .timer-container {
      position: relative;
      width: 150px;
      height: 150px;
    }
    .timer-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.6rem;
      color: #fff;
      font-weight: bold;
    }
    .timer-circle {
      transform: rotate(90deg);
    }
    .timer-circle-bg {
      fill: none;
      stroke: #333;
      stroke-width: 8;
    }
    .timer-circle-progress {
      fill: none;
      stroke: #28a745;
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
    }
    .timer-circle-progress.overdue {
      stroke: #d9534f;
    }
    .task-header {
      margin-bottom: 12px;
      padding: 8px;
      background-color: #333;
      border-radius: 5px;
    }
    .task-header .fields {
      display: flex;
      flex-wrap: nowrap;
      gap: 3px;
      justify-content: space-between;
    }
    .task-header .field {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
    }
    .task-header label, .prompts-header label, .rewards-header label {
      font-size: 0.75rem;
      margin-bottom: 2px;
      color: #ccc;
    }
    .task-header input, .prompts-header input, .rewards-header input {
      padding: 3px;
      font-size: 0.75rem;
      border: 1px solid #555;
      border-radius: 3px;
      box-sizing: border-box;
      width: 80px;
      height: 24px;
      background-color: #444;
      color: #fff;
    }
    textarea {
      flex: 1;
      width: 100%;
      padding: 6px;
      font-size: 0.85rem;
      border: 1px solid #555;
      border-radius: 3px;
      resize: none;
      box-sizing: border-box;
      background-color: #222;
      color: #fff;
    }
    .prompts-header, .rewards-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .prompts-list, .rewards-list {
      flex: 1;
      overflow-y: auto;
    }
    .prompt-item, .reward-item {
      display: flex;
      align-items: center;
      padding: 6px;
      border-bottom: 1px solid #555;
    }
    .prompt-item span, .reward-item span {
      flex: 1;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .prompt-item input[type="text"], .reward-item input[type="text"] {
      flex: 1;
      padding: 3px;
      font-size: 0.9rem;
      border: 1px solid #555;
      border-radius: 3px;
      background-color: #444;
      color: #fff;
    }
    .prompt-item input[type="checkbox"] {
      margin-right: 5px;
    }
    .prompt-item label {
      font-size: 0.75rem;
      color: #ccc;
      margin-right: 10px;
    }
    .prompt-item button, .reward-item button {
      background-color: #555;
      color: #fff;
      border: none;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .prompt-item button:hover, .reward-item button:hover {
      background-color: #666;
    }
    .prompt-item.important span {
      color: #28a745;
    }
    .notes-input, .summary-input {
      width: 100%;
      height: 100%;
      padding: 6px;
      font-size: 0.85rem;
      border: 1px solid #555;
      border-radius: 3px;
      box-sizing: border-box;
      background-color: #222;
      color: #fff;
      resize: none;
    }
    /* Reward Pop-Up Styles */
    .reward-popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .reward-popup.active {
      display: flex;
    }
    .reward-box {
      background-color: #333;
      padding: 20px;
      border-radius: 5px;
      text-align: center;
      color: #fff;
      max-width: 300px;
      width: 80%;
    }
    .reward-box p {
      margin: 0 0 20px 0;
      font-size: 1.2rem;
      font-weight: bold;
      color: #28a745;
    }
    .reward-box button {
      background-color: #444;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .reward-box button:hover {
      background-color: #555;
    }
    /* Confirmation Dialog Styles */
    .confirmation-dialog {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .confirmation-dialog.active {
      display: flex;
    }
    .confirmation-box {
      background-color: #333;
      padding: 20px;
      border-radius: 5px;
      text-align: center;
      color: #fff;
      max-width: 300px;
      width: 80%;
    }
