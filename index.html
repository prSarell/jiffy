<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jiffy</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Jiffy">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Arial', sans-serif;
      background-color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      font-size: 14px;
      color: #fff;
    }
    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 15px;
      background-color: #000;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 500;
    }
    .header .category-container {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .header .category-name {
      display: inline-block;
      touch-action: pan-y;
    }
    .header .category-input {
      padding: 3px;
      font-size: 1rem;
      border: 1px solid #555;
      border-radius: 3px;
      background-color: #444;
      color: #fff;
      width: 200px;
    }
    .header button {
      background: none;
      border: none;
      color: #999;
      font-size: 1.5rem;
      padding: 5px 8px;
      cursor: pointer;
    }
    .header button:hover {
      color: #fff;
    }
    .prompt-display {
      background-color: #000;
      padding: 8px 15px;
      text-align: center;
      font-weight: bold;
      font-size: 0.9rem;
      color: #fff;
      border-bottom: 1px solid #333;
    }
    .prompt-display.important {
      color: #28a745;
    }
    .tabs {
      display: flex;
      background-color: #000;
      padding: 6px 0;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      border-bottom: 1px solid #333;
      position: relative;
      z-index: 1;
    }
    .tab {
      padding: 6px 10px;
      cursor: pointer;
      color: #999;
      font-size: 0.85rem;
      flex: 1;
      text-align: center;
      min-width: 55px;
      transition: color 0.2s ease;
    }
    .tab.active {
      color: #fff;
      border-bottom: 2px solid #fff;
    }
    .tab-content {
      display: none;
      padding: 10px;
      flex: 1;
      overflow-y: auto;
      background-color: #1a1a1a;
    }
    .tab-content.active {
      display: flex;
      flex-direction: column;
    }
    .pb-details, .prompts-header, .rewards-header {
      background-color: #333;
      padding: 6px;
      border-radius: 5px;
      margin-bottom: 8px;
      font-size: 0.8rem;
      color: #ccc;
    }
    .pb-details {
      display: flex;
      flex-wrap: nowrap;
      gap: 10px;
      justify-content: space-between;
    }
    .pb-details div {
      flex: 0 0 auto;
      text-align: left;
    }
    .pb-controls {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
      gap: 6px;
    }
    .pb-controls button, .prompts-header button, .rewards-header button {
      background-color: #444;
      color: #fff;
      border: none;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 5px;
      font-size: 0.85rem;
      touch-action: manipulation;
    }
    .pb-controls button:hover, .prompts-header button:hover, .rewards-header button:hover {
      background-color: #555;
    }
    .pb-timer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
    }
    .timer-container {
      position: relative;
      width: 150px;
      height: 150px;
    }
    .timer-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.6rem;
      color: #fff;
      font-weight: bold;
    }
    .timer-circle {
      transform: rotate(90deg);
    }
    .timer-circle-bg {
      fill: none;
      stroke: #333;
      stroke-width: 8;
    }
    .timer-circle-progress {
      fill: none;
      stroke: #28a745;
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
    }
    .timer-circle-progress.overdue {
      stroke: #d9534f;
    }
    .task-header {
      margin-bottom: 12px;
      padding: 8px;
      background-color: #333;
      border-radius: 5px;
    }
    .task-header .fields {
      display: flex;
      flex-wrap: nowrap;
      gap: 3px;
      justify-content: space-between;
    }
    .task-header .field {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
    }
    .task-header label, .prompts-header label, .rewards-header label {
      font-size: 0.75rem;
      margin-bottom: 2px;
      color: #ccc;
    }
    .task-header input, .prompts-header input, .rewards-header input {
      padding: 3px;
      font-size: 0.75rem;
      border: 1px solid #555;
      border-radius: 3px;
      box-sizing: border-box;
      width: 80px;
      height: 24px;
      background-color: #444;
      color: #fff;
    }
    textarea {
      flex: 1;
      width: 100%;
      padding: 6px;
      font-size: 0.85rem;
      border: 1px solid #555;
      border-radius: 3px;
      resize: none;
      box-sizing: border-box;
      background-color: #222;
      color: #fff;
    }
    .prompts-header, .rewards-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .prompts-list, .rewards-list {
      flex: 1;
      overflow-y: auto;
    }
    .prompt-item, .reward-item {
      display: flex;
      align-items: center;
      padding: 6px;
      border-bottom: 1px solid #555;
    }
    .prompt-item span, .reward-item span {
      flex: 1;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .prompt-item input[type="text"], .reward-item input[type="text"] {
      flex: 1;
      padding: 3px;
      font-size: 0.9rem;
      border: 1px solid #555;
      border-radius: 3px;
      background-color: #444;
      color: #fff;
    }
    .prompt-item input[type="checkbox"] {
      margin-right: 5px;
    }
    .prompt-item label {
      font-size: 0.75rem;
      color: #ccc;
      margin-right: 10px;
    }
    .prompt-item button, .reward-item button {
      background-color: #555;
      color: #fff;
      border: none;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .prompt-item button:hover, .reward-item button:hover {
      background-color: #666;
    }
    .prompt-item.important span {
      color: #28a745;
    }
    .notes-input, .summary-input {
      width: 100%;
      height: 100%;
      padding: 6px;
      font-size: 0.85rem;
      border: 1px solid #555;
      border-radius: 3px;
      box-sizing: border-box;
      background-color: #222;
      color: #fff;
      resize: none;
    }
    .reward-popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .reward-popup.active {
      display: flex;
    }
    .reward-box {
      background-color: #333;
      padding: 20px;
      border-radius: 5px;
      text-align: center;
      color: #fff;
      max-width: 300px;
      width: 80%;
    }
    .reward-box p {
      margin: 0 0 20px 0;
      font-size: 1.2rem;
      font-weight: bold;
      color: #28a745;
    }
    .reward-box button {
      background-color: #444;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .reward-box button:hover {
      background-color: #555;
    }
    .confirmation-dialog {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .confirmation-dialog.active {
      display: flex;
    }
    .confirmation-box {
      background-color: #333;
      padding: 20px;
      border-radius: 5px;
      text-align: center;
      color: #fff;
      max-width: 300px;
      width: 80%;
    }
    .confirmation-box p {
      margin: 0 0 20px 0;
      font-size: 1rem;
    }
    .confirmation-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    .confirmation-buttons button {
      background-color: #444;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .confirmation-buttons button:hover {
      background-color: #555;
    }
    .confirmation-buttons .yes-btn {
      background-color: #d9534f;
    }
    .confirmation-buttons .yes-btn:hover {
      background-color: #c9302c;
    }
    @media (max-width: 393px) {
      body {
        font-size: 13px;
      }
      .header {
        padding: 8px 12px;
        font-size: 1rem;
      }
      .header .category-container {
        gap: 16px;
      }
      .header button {
        font-size: 1.3rem;
        padding: 4px 6px;
      }
      .header .category-input {
        font-size: 0.9rem;
        width: 160px;
      }
      .prompt-display {
        padding: 6px 12px;
        font-size: 0.8rem;
      }
      .tabs {
        padding: 5px 0;
      }
      .tab {
        padding: 5px 8px;
        font-size: 0.8rem;
        min-width: 50px;
      }
      .tab-content {
        padding: 8px;
      }
      .pb-details, .prompts-header, .rewards-header {
        font-size: 0.75rem;
        gap: 5px;
      }
      .pb-details {
        flex-wrap: nowrap;
        gap: 5px;
      }
      .pb-controls button, .prompts-header button, .rewards-header button {
        padding: 5px 10px;
        font-size: 0.8rem;
      }
      .timer-container {
        width: 130px;
        height: 130px;
      }
      .timer-display {
        font-size: 1.4rem;
      }
      .task-header, .prompts-header, .rewards-header {
        padding: 6px;
      }
      .task-header .fields {
        gap: 2px;
      }
      .task-header input, .prompts-header input, .rewards-header input {
        font-size: 0.7rem;
        padding: 2px;
        width: 75px;
        height: 22px;
      }
      textarea {
        font-size: 0.8rem;
        padding: 5px;
      }
      .prompt-item, .reward-item {
        padding: 5px;
      }
      .prompt-item span, .reward-item span {
        font-size: 0.85rem;
      }
      .prompt-item input[type="text"], .reward-item input[type="text"] {
        font-size: 0.85rem;
      }
      .prompt-item label {
        font-size: 0.7rem;
      }
      .prompt-item button, .reward-item button {
        padding: 3px 6px;
        font-size: 0.7rem;
      }
      .confirmation-box {
        padding: 15px;
      }
      .confirmation-box p {
        font-size: 0.9rem;
      }
      .confirmation-buttons button {
        padding: 6px 12px;
        font-size: 0.8rem;
      }
      .reward-box {
        padding: 15px;
      }
      .reward-box p {
        font-size: 1rem;
      }
      .reward-box button {
        padding: 6px 12px;
        font-size: 0.8rem;
      }
      .notes-input, .summary-input {
        font-size: 0.8rem;
        padding: 5px;
      }
    }
  </style>
</head>
<body>
  <div class="confirmation-dialog" id="confirmationDialog">
    <div class="confirmation-box">
      <p id="confirmationMessage"></p>
      <div class="confirmation-buttons">
        <button class="yes-btn" onclick="confirmDeleteCategory(true)">Yes</button>
        <button onclick="confirmDeleteCategory(false)">No</button>
      </div>
    </div>
  </div>
  <div class="reward-popup" id="rewardPopup">
    <div class="reward-box">
      <p id="rewardMessage"></p>
      <button onclick="closeRewardPopup()">Close</button>
    </div>
  </div>
  <div class="header">
    <div class="category-container">
      <button onclick="removeCategory()">-</button>
      <span id="category-header" class="category-name"></span>
      <button onclick="addCategory()">+</button>
    </div>
  </div>
  <div class="prompt-display" id="promptDisplay"></div>
  <div class="tabs">
    <div class="tab" onclick="showTab('tasks')">Tasks</div>
    <div class="tab active" onclick="showTab('pb')">Pomo</div>
    <div class="tab" onclick="showTab('prompts')">Prompts</div>
    <div class="tab" onclick="showTab('notes')">Notes</div>
    <div class="tab" onclick="showTab('summary')">Summary</div>
    <div class="tab" onclick="showTab('rewards')">Rewards</div>
  </div>
  <div id="tasks" class="tab-content">
    <div class    <div class="task-header">
      <div class="fields">
        <div class="field">
          <label for="stage">Stage</label>
          <input id="stage" type="text" value="Scales">
        </div>
        <div class="field">
          <label for="date">Date</label>
          <input id="date" type="text" readonly>
        </div>
        <div class="field">
          <label for="due">Due</label>
          <input id="due" type="text" value="TBC">
        </div>
        <div class="field">
          <label for="task-time">Time</label>
          <input id="task-time" type="text" placeholder="e.g., 1:30:00 or 30 min">
        </div>
      </div>
    </div>
    <textarea id="task-notes" placeholder="Write your notes here..."></textarea>
  </div>
  <div id="pb" class="tab-content active">
    <div class="pb-details">
      <div>Stage: <span id="pb-stage"></span></div>
      <div>Date: <span id="pb-date"></span></div>
      <div>Due: <span id="pb-due"></span></div>
      <div>Time: <span id="pb-time"></span></div>
    </div>
    <div class="pb-controls">
      <button id="start-pause-btn" onclick="toggleStartPause()">Start</button>
      <button onclick="completeTimer()">Complete</button>
      <button onclick="resetTimer()">Reset</button>
    </div>
    <div class="pb-timer">
      <div class="timer-container">
        <svg width="100%" height="100%" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet" class="timer-circle">
          <circle class="timer-circle-bg" cx="100" cy="100" r="95"/>
          <circle id="timer-circle-progress" class="timer-circle-progress" cx="100" cy="100" r="95" stroke-dasharray="596.9" stroke-dashoffset="0"/>
        </svg>
        <div id="pb-timer" class="timer-display">00:00:00</div>
      </div>
    </div>
  </div>
  <div id="prompts" class="tab-content">
    <div class="prompts-header">
      <div>
        <label for="refresh-interval">Refresh Interval (MM:SS)</label>
        <input id="refresh-interval" type="text" value="00:30">
      </div>
      <button onclick="showAddPromptInput()">Add Prompt</button>
      <button onclick="requestNotificationPermission()">Allow Notifications</button>
    </div>
    <div class="prompts-list" id="prompts-list"></div>
  </div>
  <div id="notes" class="tab-content">
    <textarea class="notes-input" placeholder="Enter your notes here..."></textarea>
  </div>
  <div id="summary" class="tab-content">
    <textarea class="summary-input" placeholder="Summary notes will appear here..."></textarea>
  </div>
  <div id="rewards" class="tab-content">
    <div class="rewards-header">
      <div>
        <label for="rewards-refresh-interval">Refresh Interval (MM:SS)</label>
        <input id="rewards-refresh-interval" type="text" value="00:30">
      </div>
      <button onclick="showAddRewardInput()">Add Reward</button>
    </div>
    <div class="rewards-list" id="rewards-list"></div>
  </div>
  <script>
    let timer = {
      totalSeconds: 0,
      seconds: 0,
      isRunning: false,
      isPaused: false,
      interval: null
    };
    let categories = ['Home', 'Life', 'Work', 'School', 'Music Practice'];
    let currentCategoryIndex = 4;
    let pendingDeleteIndex = null;
    let promptCounter = 0;
    let rewardCounter = 0;
    let currentPromptIndex = 0;
    let notificationInstance = null;

    function requestNotificationPermission() {
      if ("Notification" in window) {
        Notification.requestPermission().then(permission => {
          console.log(permission === "granted" ? "Notification permission granted" : "Notification permission denied");
        }).catch(err => console.error("Error requesting notification permission:", err));
      } else {
        console.log("Notifications not supported in this browser");
      }
    }

    function sendPromptNotification(promptText) {
      if ("Notification" in window && Notification.permission === "granted") {
        try {
          if (notificationInstance) notificationInstance.close();
          notificationInstance = new Notification("Jiffy Reminder", {
            body: promptText,
            icon: "icon.png",
            requireInteraction: false
          });
          setTimeout(() => {
            if (notificationInstance) {
              notificationInstance.close();
              notificationInstance = null;
            }
          }, 5000);
        } catch (e) {
          console.error('Error sending notification:', e);
        }
      }
    }

    function getNextPrompt() {
      const prompts = getPrompts();
      if (prompts.length === 0) return null;
      try {
        let storedIndex = localStorage.getItem('currentPromptIndex');
        currentPromptIndex = storedIndex !== null ? parseInt(storedIndex, 10) : 0;
        if (currentPromptIndex >= prompts.length) currentPromptIndex = 0;
        const prompt = prompts[currentPromptIndex];
        currentPromptIndex = (currentPromptIndex + 1) % prompts.length;
        localStorage.setItem('currentPromptIndex', currentPromptIndex);
        return prompt;
      } catch (e) {
        console.error('Error getting next prompt:', e);
        return prompts[0];
      }
    }

    function displaySequentialPrompt() {
      try {
        const prompt = getNextPrompt();
        const display = document.getElementById('promptDisplay');
        if (!display) {
          console.error('promptDisplay element not found');
          return;
        }
        if (prompt) {
          display.textContent = prompt.text;
          if (prompt.isImportant) {
            display.classList.add('important');
          } else {
            display.classList.remove('important');
          }
          if (document.hidden) {
            sendPromptNotification(prompt.text);
          }
        } else {
          display.textContent = '';
        }
        const intervalInput = document.getElementById('refresh-interval');
        if (!intervalInput) {
          console.error('refresh-interval input not found');
          return;
        }
        let intervalSeconds = parseTimeInput(intervalInput.value);
        if (intervalSeconds <= 0) intervalSeconds = 60;
        const intervalMs = intervalSeconds * 1000;
        setTimeout(displaySequentialPrompt, intervalMs);
      } catch (e) {
        console.error('Error in displaySequentialPrompt:', e);
      }
    }

    function showRewardPopup(rewardText) {
      const popup = document.getElementById('rewardPopup');
      const message = document.getElementById('rewardMessage');
      if (popup && message) {
        message.textContent = rewardText;
        popup.classList.add('active');
      } else {
        console.error('Reward popup elements not found');
      }
    }

    function closeRewardPopup() {
      const popup = document.getElementById('rewardPopup');
      if (popup) {
        popup.classList.remove('active');
      } else {
        console.error('Reward popup not found');
      }
    }

    let touchStartX = 0;
    let touchEndX = 0;
    const categoryHeader = document.getElementById('category-header');

    if (categoryHeader) {
      categoryHeader.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
      });

      categoryHeader.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
      });
    } else {
      console.error('category-header element not found');
    }

    function handleSwipe() {
      const swipeThreshold = 50;
      if (touchEndX < touchStartX - swipeThreshold) {
        saveCategorySpecificData();
        currentCategoryIndex = (currentCategoryIndex + 1) % categories.length;
      } else if (touchEndX > touchStartX + swipeThreshold) {
        saveCategorySpecificData();
        currentCategoryIndex = (currentCategoryIndex - 1 + categories.length) % categories.length;
      }
      const categoryHeader = document.getElementById('category-header');
      if (categoryHeader) {
        categoryHeader.textContent = categories[currentCategoryIndex];
        loadCategorySpecificData();
      } else {
        console.error('category-header element not found during swipe');
      }
    }

    function saveGlobalData() {
      try {
        const prompts = getPrompts();
        const rewards = getRewards();
        const globalData = { prompts, rewards };
        localStorage.setItem('globalData', JSON.stringify(globalData));
        console.log('Global data saved:', globalData);
      } catch (e) {
        console.error('Error saving global data:', e);
      }
    }

    function loadGlobalData() {
      try {
        const globalData = JSON.parse(localStorage.getItem('globalData')) || {};
        const prompts = globalData.prompts || [
          { text: "PAY PARKING FINE!!!", isImportant: true },
          { text: "Get milk", isImportant: false },
          { text: "Breathe", isImportant: false },
          { text: "2pm Mtg!!!", isImportant: true }
        ];
        const rewards = globalData.rewards || [
          "Great job, you smashed it!",
          "You're killing it!",
          "Fantastic work!",
          "On fire",
          "Yeah Bouy!",
          "Fernsteuerung!",
          "Way to go, superstar!",
          "Crushing it!",
          "Nailed it!",
          "Bravo, that was amazing!",
          "Impressive work, well done!",
          "Smashing work Gromit!",
          "Superb effort, keep shining!",
          "You're unstoppable!",
          "What a triumph!",
          "Amazing job, keep up the great work!",
          "Incredible, you're a rockstar!",
          "Sensational performance!",
          "Your productivity is inspiring!",
          "Mike, you F*cken LEGEND!!!",
          "They said you'd never make it, but you finally came through!",
          "You’re a wizard Harry!"
        ];
        populatePrompts(prompts);
        populateRewards(rewards);
        promptCounter = prompts.length;
        rewardCounter = rewards.length;
        console.log('Global data loaded:', globalData);
      } catch (e) {
        console.error('Error loading global data:', e);
        populatePrompts([
          { text: "PAY PARKING FINE!!!", isImportant: true },
          { text: "Get milk", isImportant: false },
          { text: "Breathe", isImportant: false },
          { text: "2pm Mtg!!!", isImportant: true }
        ]);
        populateRewards([
          "Great job, you smashed it!",
          "You're killing it!",
          "Fantastic work!",
          "On fire",
          "Yeah Bouy!",
          "Fernsteuerung!",
          "Way to go, superstar!",
          "Crushing it!",
          "Nailed it!",
          "Bravo, that was amazing!",
          "Impressive work, well done!",
          "Smashing work Gromit!",
          "Superb effort, keep shining!",
          "You're unstoppable!",
          "What a triumph!",
          "Amazing job, keep up the great work!",
          "Incredible, you're a rockstar!",
          "Sensational performance!",
          "Your productivity is inspiring!",
          "Mike, you F*cken LEGEND!!!",
          "They said you'd never make it, but you finally came through!",
          "You’re a wizard Harry!"
        ]);
        promptCounter = 4;
        rewardCounter = 22;
      }
    }

    function saveCategorySpecificData() {
      try {
        const currentCategory = categories[currentCategoryIndex];
        const tasksData = {
          stage: document.getElementById('stage')?.value,
          date: document.getElementById('date')?.value,
          due: document.getElementById('due')?.value,
          time: document.getElementById('task-time')?.value,
          notes: document.getElementById('task-notes')?.value
        };
        const notesData = document.querySelector('#notes .notes-input')?.value;
        const summaryData = document.querySelector('#summary .summary-input')?.value;
        const categoryData = {
          tasks: tasksData,
          notes: notesData,
          summary: summaryData
        };
        let categorySpecificData = JSON.parse(localStorage.getItem('categorySpecificData')) || {};
        categorySpecificData[currentCategory] = categoryData;
        localStorage.setItem('categorySpecificData', JSON.stringify(categorySpecificData));
        console.log(`Category-specific data saved for ${currentCategory}:`, categoryData);
      } catch (e) {
        console.error('Error saving category-specific data:', e);
      }
    }

    function loadCategorySpecificData() {
      try {
        const currentCategory = categories[currentCategoryIndex];
        const categorySpecificData = JSON.parse(localStorage.getItem('categorySpecificData')) || {};
        const categoryData = categorySpecificData[currentCategory] || {};
        const tasksData = categoryData.tasks || {
          stage: "Scales",
          date: formatDate(),
          due: "TBC",
          time: "",
          notes: ""
        };
        const notesData = categoryData.notes || "";
        const summaryData = categoryData.summary || "";
        const stageInput = document.getElementById('stage');
        const dateInput = document.getElementById('date');
        const dueInput = document.getElementById('due');
        const taskTimeInput = document.getElementById('task-time');
        const taskNotesInput = document.getElementById('task-notes');
        if (stageInput) stageInput.value = tasksData.stage;
        if (dateInput) dateInput.value = tasksData.date;
        if (dueInput) dueInput.value = tasksData.due;
        if (taskTimeInput) taskTimeInput.value = tasksData.time;
        if (taskNotesInput) taskNotesInput.value = tasksData.notes;
        updatePBDetails();
        const notesInput = document.querySelector('#notes .notes-input');
        const summaryInput = document.querySelector('#summary .summary-input');
        if (notesInput) notesInput.value = notesData;
        if (summaryInput) summaryInput.value = summaryData;
        console.log(`Category-specific data loaded for ${currentCategory}:`, categoryData);
      } catch (e) {
        console.error('Error loading category-specific data:', e);
        const stageInput = document.getElementById('stage');
        const dateInput = document.getElementById('date');
        const dueInput = document.getElementById('due');
        const taskTimeInput = document.getElementById('task-time');
        const taskNotesInput = document.getElementById('task-notes');
        if (stageInput) stageInput.value = "Scales";
        if (dateInput) dateInput.value = formatDate();
        if (dueInput) dueInput.value = "TBC";
        if (taskTimeInput) taskTimeInput.value = "";
        if (taskNotesInput) taskNotesInput.value = "";
        const notesInput = document.querySelector('#notes .notes-input');
        const summaryInput = document.querySelector('#summary .summary-input');
        if (notesInput) notesInput.value = "";
        if (summaryInput) summaryInput.value = "";
        updatePBDetails();
      }
    }

    function saveCategories() {
      try {
        const categoriesData = {
          categories: categories,
          currentCategoryIndex: currentCategoryIndex
        };
        localStorage.setItem('categoriesData', JSON.stringify(categoriesData));
        console.log('Categories saved:', categoriesData);
      } catch (e) {
        console.error('Error saving categories:', e);
      }
    }

    function loadCategories() {
      try {
        const categoriesData = JSON.parse(localStorage.getItem('categoriesData')) || {};
        categories = categoriesData.categories || ['Home', 'Life', 'Work', 'School', 'Music Practice'];
        currentCategoryIndex = categoriesData.currentCategoryIndex || 4;
        if (currentCategoryIndex >= categories.length) {
          currentCategoryIndex = categories.length - 1;
        }
        const categoryHeader = document.getElementById('category-header');
        if (categoryHeader) {
          categoryHeader.textContent = categories[currentCategoryIndex];
        } else {
          console.error('category-header element not found');
        }
        console.log('Categories loaded:', categoriesData);
      } catch (e) {
        console.error('Error loading categories:', e);
        categories = ['Home', 'Life', 'Work', 'School', 'Music Practice'];
        currentCategoryIndex = 4;
        const categoryHeader = document.getElementById('category-header');
        if (categoryHeader) {
          categoryHeader.textContent = categories[currentCategoryIndex];
        }
      }
    }

    function addCategory() {
      const container = document.querySelector('.category-container');
      if (container) {
        container.innerHTML = `
          <button onclick="removeCategory()">-</button>
          <input type="text" class="category-input" placeholder="Enter new category..." onblur="saveCategory(this)" onkeypress="if(event.key === 'Enter') saveCategory(this)">
          <button onclick="addCategory()">+</button>
        `;
        container.querySelector('input').focus();
      } else {
        console.error('category-container not found');
      }
    }

    function saveCategory(input) {
      const newCategory = input.value.trim();
      if (newCategory) {
        categories.push(newCategory);
        saveCategorySpecificData();
        currentCategoryIndex = categories.length - 1;
        saveCategories();
      }
      const container = document.querySelector('.category-container');
      if (container) {
        container.innerHTML = `
          <button onclick="removeCategory()">-</button>
          <span id="category-header" class="category-name">${categories[currentCategoryIndex]}</span>
          <button onclick="addCategory()">+</button>
        `;
        const newCategoryHeader = document.getElementById('category-header');
        if (newCategoryHeader) {
          newCategoryHeader.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
          });
          newCategoryHeader.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
          });
        }
        loadCategorySpecificData();
      } else {
        console.error('category-container not found');
      }
    }

    function removeCategory() {
      if (categories.length <= 1) {
        alert('Cannot remove the last category. At least one category is required.');
        return;
      }
      pendingDeleteIndex = currentCategoryIndex;
      const categoryName = categories[currentCategoryIndex];
      const dialog = document.getElementById('confirmationDialog');
      const message = document.getElementById('confirmationMessage');
      if (dialog && message) {
        message.textContent = `Are you sure you want to delete '${categoryName}'?`;
        dialog.classList.add('active');
      } else {
        console.error('Confirmation dialog elements not found');
      }
    }

    function confirmDeleteCategory(confirm) {
      const dialog = document.getElementById('confirmationDialog');
      if (dialog) {
        dialog.classList.remove('active');
      }
      if (confirm && pendingDeleteIndex !== null) {
        const categoryToRemove = categories[pendingDeleteIndex];
        categories.splice(pendingDeleteIndex, 1);
        currentCategoryIndex = Math.min(pendingDeleteIndex, categories.length - 1);
        if (categories.length === 0) {
          categories = ['Default'];
          currentCategoryIndex = 0;
        }
        try {
          let categorySpecificData = JSON.parse(localStorage.getItem('categorySpecificData')) || {};
          delete categorySpecificData[categoryToRemove];
          localStorage.setItem('categorySpecificData', JSON.stringify(categorySpecificData));
        } catch (e) {
          console.error('Error removing category-specific data:', e);
        }
        saveCategories();
        const categoryHeader = document.getElementById('category-header');
        if (categoryHeader) {
          categoryHeader.textContent = categories[currentCategoryIndex];
          loadCategorySpecificData();
        }
      }
      pendingDeleteIndex = null;
    }

    function parseTimeInput(input) {
      if (!input) return 0;
      input = input.trim().toLowerCase();
      if (input.includes(':')) {
        const parts = input.split(':').map(n => parseInt(n));
        let minutes = 0, seconds = 0;
        if (parts.length === 2) {
          [minutes, seconds] = parts;
        }
        return (isNaN(minutes) ? 0 : minutes * 60) + (isNaN(seconds) ? 0 : seconds);
      } else {
        const num = parseInt(input);
        return isNaN(num) ? 0 : num;
      }
    }

    function showTab(tabName) {
      console.log(`Switching to tab: ${tabName}`);
      document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.remove('active');
        console.log(`Deactivating content: ${content.id}`);
      });
      document.querySelectorAll('.tab').forEach(tab => {
        tab.classList.remove('active');
        console.log(`Deactivating tab: ${tab.textContent}`);
      });
      const targetContent = document.getElementById(tabName);
      const targetTab = document.querySelector(`.tab[onclick="showTab('${tabName}')"]`);
      if (targetContent && targetTab) {
        targetContent.classList.add('active');
        targetTab.classList.add('active');
        console.log(`Activated tab: ${tabName}`);
      } else {
        console.error(`Tab or content not found for: ${tabName}`);
      }
      if (tabName === 'pb') {
        updatePBDetails();
        resetTimer();
      }
    }

    function updatePBDetails() {
      const pbStage = document.getElementById('pb-stage');
      const pbDate = document.getElementById('pb-date');
      const pbDue = document.getElementById('pb-due');
      const pbTime = document.getElementById('pb-time');
      if (pbStage && pbDate && pbDue && pbTime) {
        pbStage.textContent = document.getElementById('stage')?.value || 'N/A';
        pbDate.textContent = document.getElementById('date')?.value || 'N/A';
        pbDue.textContent = document.getElementById('due')?.value || 'N/A';
        pbTime.textContent = document.getElementById('task-time')?.value || 'N/A';
      } else {
        console.error('PB details elements not found');
      }
    }

    function toggleStartPause() {
      if (!timer.isRunning) {
        timer.totalSeconds = parseTimeInput(document.getElementById('task-time')?.value);
        if (timer.totalSeconds <= 0) {
          alert('Please enter a valid time in the Tasks tab (e.g., "1:30:00" or "30 min").');
          return;
        }
        timer.seconds = timer.totalSeconds;
        timer.isRunning = true;
        timer.isPaused = false;
        timer.interval = setInterval(() => {
          if (!timer.isPaused) {
            timer.seconds--;
            updateTimerDisplay();
            updateCircleProgress();
          }
        }, 1000);
        const startPauseBtn = document.getElementById('start-pause-btn');
        if (startPauseBtn) startPauseBtn.textContent = 'Pause';
      } else {
        timer.isPaused = !timer.isPaused;
        const startPauseBtn = document.getElementById('start-pause-btn');
        if (startPauseBtn) startPauseBtn.textContent = timer.isPaused ? 'Resume' : 'Pause';
      }
    }

    function completeTimer() {
      clearInterval(timer.interval);
      timer.isRunning = false;
      timer.isPaused = false;
      if (timer.seconds > 0) {
        const rewards = getRewards();
        if (rewards.length > 0) {
          const randomIndex = Math.floor(Math.random() * rewards.length);
          const reward = rewards[randomIndex];
          showRewardPopup(reward);
        }
      }
      timer.seconds = timer.totalSeconds;
      timer.interval = null;
      updateTimerDisplay();
      updateCircleProgress();
      const startPauseBtn = document.getElementById('start-pause-btn');
      if (startPauseBtn) startPauseBtn.textContent = 'Start';
      const stage = document.getElementById('pb-stage')?.textContent;
      const date = document.getElementById('pb-date')?.textContent;
      const due = document.getElementById('pb-due')?.textContent;
      const time = document.getElementById('pb-time')?.textContent;
      const summaryEntry = `Completed Task - Stage: ${stage}, Date: ${date}, Due: ${due}, Time: ${time}\n`;
      const summaryTextarea = document.querySelector('#summary .summary-input');
      if (summaryTextarea) {
        summaryTextarea.value = (summaryTextarea.value ? summaryTextarea.value + '\n' : '') + summaryEntry;
        saveCategorySpecificData();
      }
    }

    function resetTimer() {
      clearInterval(timer.interval);
      timer.isRunning = false;
      timer.isPaused = false;
      timer.totalSeconds = parseTimeInput(document.getElementById('task-time')?.value);
      timer.seconds = timer.totalSeconds;
      timer.interval = null;
      updateTimerDisplay();
      updateCircleProgress();
      const startPauseBtn = document.getElementById('start-pause-btn');
      if (startPauseBtn) startPauseBtn.textContent = 'Start';
    }

    function updateTimerDisplay() {
      const absSeconds = Math.abs(timer.seconds);
      const hours = Math.floor(absSeconds / 3600);
      const minutes = Math.floor((absSeconds % 3600) / 60);
      const seconds = absSeconds % 60;
      const timeStr = `${timer.seconds < 0 ? '-' : ''}${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      const pbTimer = document.getElementById('pb-timer');
      if (pbTimer) pbTimer.textContent = timeStr;
    }

    function updateCircleProgress() {
      const circle = document.getElementById('timer-circle-progress');
      if (circle) {
        const circumference = 596.9;
        let progress = timer.totalSeconds ? timer.seconds / timer.totalSeconds : 1;
        if (progress < 0) {
          progress = 0;
          circle.classList.add('overdue');
        } else {
          circle.classList.remove('overdue');
        }
        const offset = -circumference * (1 - progress);
        circle.setAttribute('stroke-dashoffset', offset);
      }
    }

    function formatDate() {
      const date = new Date();
      const monthNames = [
        'January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'
      ];
      const day = date.getDate();
      const suffix = (day % 10 === 1 && day !== 11) ? 'st' :
                     (day % 10 === 2 && day !== 12) ? 'nd' :
                     (day % 10 === 3 && day !== 13) ? 'rd' : 'th';
      return `${monthNames[date.getMonth()]} ${day}${suffix}`;
    }

    function getPrompts() {
      const promptItems = document.querySelectorAll('#prompts-list .prompt-item');
      const prompts = [];
      promptItems.forEach(item => {
        const text = item.querySelector('span')?.textContent;
        const isImportant = item.classList.contains('important');
        if (text) prompts.push({ text, isImportant });
      });
      return prompts;
    }

    function populatePrompts(prompts) {
      const list = document.getElementById('prompts-list');
      if (list) {
        list.innerHTML = '';
        prompts.forEach((prompt, index) => {
          const promptDiv = document.createElement('div');
          promptDiv.className = 'prompt-item';
          if (prompt.isImportant) {
            promptDiv.classList.add('important');
          }
          promptDiv.innerHTML = `
            <span ondblclick="editPrompt(this)">${prompt.text}</span>
            <input type="checkbox" id="important-${index}" ${prompt.isImportant ? 'checked' : ''} onchange="toggleImportant(this)">
            <label for="important-${index}">Important</label>
            <button onclick="deletePrompt(this)">Delete</button>
          `;
          list.appendChild(promptDiv);
        });
      } else {
        console.error('prompts-list element not found');
      }
    }

    function showAddPromptInput() {
      const list = document.getElementById('prompts-list');
      if (list) {
        const inputDiv = document.createElement('div');
        inputDiv.className = 'prompt-item';
        inputDiv.innerHTML = `
          <input type="text" placeholder="Enter new prompt..." onblur="addPrompt(this)" onkeypress="if(event.key === 'Enter') addPrompt(this)">
        `;
        list.insertBefore(inputDiv, list.firstChild);
        inputDiv.querySelector('input').focus();
      } else {
        console.error('prompts-list element not found');
      }
    }

    function addPrompt(input) {
      const text = input.value.trim();
      if (text) {
        promptCounter++;
        const promptDiv = document.createElement('div');
        promptDiv.className = 'prompt-item';
        promptDiv.innerHTML = `
          <span ondblclick="editPrompt(this)">${text}</span>
          <input type="checkbox" id="important-${promptCounter}" onchange="toggleImportant(this)">
          <label for="important-${promptCounter}">Important</label>
          <button onclick="deletePrompt(this)">Delete</button>
        `;
        input.parentElement.replaceWith(promptDiv);
        saveGlobalData();
      } else {
        input.parentElement.remove();
      }
    }

    function editPrompt(span) {
      const promptItem = span.parentElement;
      const currentText = span.textContent;
      const isImportant = promptItem.classList.contains('important');
      const checkboxId = promptItem.querySelector('input[type="checkbox"]').id;
      promptItem.innerHTML = `
        <input type="text" value="${currentText}" onblur="savePromptEdit(this)" onkeypress="if(event.key === 'Enter') savePromptEdit(this)">
        <input type="checkbox" id="${checkboxId}" ${isImportant ? 'checked' : ''} onchange="toggleImportant(this)">
        <label for="${checkboxId}">Important</label>
        <button onclick="deletePrompt(this)">Delete</button>
      `;
      promptItem.querySelector('input[type="text"]').focus();
    }

    function savePromptEdit(input) {
      const promptItem = input.parentElement;
      const newText = input.value.trim();
      const isImportant = promptItem.classList.contains('important');
      const checkboxId = promptItem.querySelector('input[type="checkbox"]').id;
      if (newText) {
        promptItem.innerHTML = `
          <span ondblclick="editPrompt(this)">${newText}</span>
          <input type="checkbox" id="${checkboxId}" ${isImportant ? 'checked' : ''} onchange="toggleImportant(this)">
          <label for="${checkboxId}">Important</label>
          <button onclick="deletePrompt(this)">Delete</button>
        `;
        if (isImportant) {
          promptItem.classList.add('important');
        }
        saveGlobalData();
      } else {
        promptItem.remove();
        saveGlobalData();
      }
    }

    function toggleImportant(checkbox) {
      const promptItem = checkbox.parentElement;
      if (checkbox.checked) {
        promptItem.classList.add('important');
      } else {
        promptItem.classList.remove('important');
      }
      saveGlobalData();
    }

    function deletePrompt(button) {
      button.parentElement.remove();
      saveGlobalData();
    }

    function getRewards() {
      const rewardItems = document.querySelectorAll('#rewards-list .reward-item');
      const rewards = [];
      rewardItems.forEach(item => {
        const text = item.querySelector('span')?.textContent;
        if (text) rewards.push(text);
      });
      return rewards;
    }

    function populateRewards(rewards) {
      const list = document.getElementById('rewards-list');
      if (list) {
        list.innerHTML = '';
        rewards.forEach((reward, index) => {
          const rewardDiv = document.createElement('div');
          rewardDiv.className = 'reward-item';
          rewardDiv.innerHTML = `
            <span ondblclick="editReward(this)">${reward}</span>
            <button onclick="deleteReward(this)">Delete</button>
          `;
          list.appendChild(rewardDiv);
        });
      } else {
        console.error('rewards-list element not found');
      }
    }

    function showAddRewardInput() {
      const list = document.getElementById('rewards-list');
      if (list) {
        const inputDiv = document.createElement('div');
        inputDiv.className = 'reward-item';
        inputDiv.innerHTML = `
          <input type="text" placeholder="Enter new reward..." onblur="addReward(this)" onkeypress="if(event.key === 'Enter') addReward(this)">
        `;
        list.insertBefore(inputDiv, list.firstChild);
        inputDiv.querySelector('input').focus();
      } else {
        console.error('rewards-list element not found');
      }
    }

    function addReward(input) {
      const text = input.value.trim();
      if (text) {
        rewardCounter++;
        const rewardDiv = document.createElement('div');
        rewardDiv.className = 'reward-item';
        rewardDiv.innerHTML = `
          <span ondblclick="editReward(this)">${text}</span>
          <button onclick="deleteReward(this)">Delete</button>
        `;
        input.parentElement.replaceWith(rewardDiv);
        saveGlobalData();
      } else {
        input.parentElement.remove();
      }
    }

    function editReward(span) {
      const rewardItem = span.parentElement;
      const currentText = span.textContent;
      rewardItem.innerHTML = `
        <input type="text" value="${currentText}" onblur="saveRewardEdit(this)" onkeypress="if(event.key === 'Enter') saveRewardEdit(this)">
        <button onclick="deleteReward(this)">Delete</button>
      `;
      rewardItem.querySelector('input[type="text"]').focus();
    }

    function saveRewardEdit(input) {
      const rewardItem = input.parentElement;
      const newText = input.value.trim();
      if (newText) {
        rewardItem.innerHTML = `
          <span ondblclick="editReward(this)">${newText}</span>
          <button onclick="deleteReward(this)">Delete</button>
        `;
        saveGlobalData();
      } else {
        rewardItem.remove();
        saveGlobalData();
      }
    }

    function deleteReward(button) {
      button.parentElement.remove();
      saveGlobalData();
    }

    function addSaveEventListeners() {
      const stage = document.getElementById('stage');
      const date = document.getElementById('date');
      const due = document.getElementById('due');
      const taskTime = document.getElementById('task-time');
      const taskNotes = document.getElementById('task-notes');
      const notesInput = document.querySelector('#notes .notes-input');
      const summaryInput = document.querySelector('#summary .summary-input');
      if (stage) stage.addEventListener('input', saveCategorySpecificData);
      if (date) date.addEventListener('input', saveCategorySpecificData);
      if (due) due.addEventListener('input', saveCategorySpecificData);
      if (taskTime) taskTime.addEventListener('input', saveCategorySpecificData);
      if (taskNotes) taskNotes.addEventListener('input', saveCategorySpecificData);
      if (notesInput) notesInput.addEventListener('input', saveCategorySpecificData);
      if (summaryInput) summaryInput.addEventListener('input', saveCategorySpecificData);
    }

    document.addEventListener('DOMContentLoaded', () => {
      try {
        console.log('DOM loaded');
        const promptDisplay = document.getElementById('promptDisplay');
        if (!promptDisplay) console.error('promptDisplay element not found');
        loadCategories();
        loadGlobalData();
        loadCategorySpecificData();
        addSaveEventListeners();
        resetTimer();
        requestNotificationPermission();
        displaySequentialPrompt();
        showTab('pb');
        document.addEventListener('visibilitychange', () => {
          try {
            console.log('Visibility changed, hidden:', document.hidden);
            if (document.hidden) {
              const prompt = getNextPrompt();
              if (prompt) sendPromptNotification(prompt.text);
            }
          } catch (e) {
            console.error('Error in visibilitychange:', e);
          }
        });
      } catch (e) {
        console.error('Initialization error:', e);
      }
    });
  </script>
