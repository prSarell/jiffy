<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Executive Assistant</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Executive Assistant">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Arial', sans-serif;
      background-color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      font-size: 14px;
      color: #fff;
    }
    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 15px;
      background-color: #000;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 500;
    }
    .header .category-container {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .header .category-name {
      display: inline-block;
      touch-action: pan-y;
    }
    .header .category-input {
      padding: 3px;
      font-size: 1rem;
      border: 1px solid #555;
      border-radius: 3px;
      background-color: #444;
      color: #fff;
      width: 200px;
    }
    .header button {
      background: none;
      border: none;
      color: #999;
      font-size: 1.5rem;
      padding: 5px 8px;
      cursor: pointer;
    }
    .header button:hover {
      color: #fff;
    }
    .tabs {
      display: flex;
      background-color: #000;
      padding: 6px 0;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      border-bottom: 1px solid #333;
    }
    .tab {
      padding: 6px 10px;
      cursor: pointer;
      color: #999;
      font-size: 0.85rem;
      flex: 1;
      text-align: center;
      min-width: 55px;
      transition: color 0.2s ease;
    }
    .tab.active {
      color: #fff;
      border-bottom: 2px solid #fff;
    }
    .tab-content {
      display: none;
      padding: 10px;
      flex: 1;
      overflow-y: auto;
      background-color: #1a1a1a;
    }
    .tab-content.active {
      display: flex;
      flex-direction: column;
    }
    .pb-details, .prompts-header, .rewards-header {
      background-color: #333;
      padding: 6px;
      border-radius: 5px;
      margin-bottom: 8px;
      font-size: 0.8rem;
      color: #ccc;
    }
    .pb-details {
      display: flex;
      flex-wrap: nowrap;
      gap: 10px;
      justify-content: space-between;
    }
    .pb-details div {
      flex: 0 0 auto;
      text-align: left;
    }
    .pb-controls {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
      gap: 6px;
    }
    .pb-controls button, .prompts-header button, .rewards-header button {
      background-color: #444;
      color: #fff;
      border: none;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 5px;
      font-size: 0.85rem;
      touch-action: manipulation;
    }
    .pb-controls button:hover, .prompts-header button:hover, .rewards-header button:hover {
      background-color: #555;
    }
    .pb-timer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
    }
    .timer-container {
      position: relative;
      width: 150px;
      height: 150px;
    }
    .timer-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.6rem;
      color: #fff;
      font-weight: bold;
    }
    .timer-circle {
      transform: rotate(90deg);
    }
    .timer-circle-bg {
      fill: none;
      stroke: #333;
      stroke-width: 8;
    }
    .timer-circle-progress {
      fill: none;
      stroke: #28a745;
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
    }
    .timer-circle-progress.overdue {
      stroke: #d9534f;
    }
    .task-header {
      margin-bottom: 12px;
      padding: 8px;
      background-color: #333;
      border-radius: 5px;
    }
    .task-header .fields {
      display: flex;
      flex-wrap: nowrap;
      gap: 3px;
      justify-content: space-between;
    }
    .task-header .field {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
    }
    .task-header label, .prompts-header label, .rewards-header label {
      font-size: 0.75rem;
      margin-bottom: 2px;
      color: #ccc;
    }
    .task-header input, .prompts-header input, .rewards-header input {
      padding: 3px;
      font-size: 0.75rem;
      border: 1px solid #555;
      border-radius: 3px;
      box-sizing: border-box;
      width: 80px;
      height: 24px;
      background-color: #444;
      color: #fff;
    }
    textarea {
      flex: 1;
      width: 100%;
      padding: 6px;
      font-size: 0.85rem;
      border: 1px solid #555;
      border-radius: 3px;
      resize: none;
      box-sizing: border-box;
      background-color: #222;
      color: #fff;
    }
    .prompts-header, .rewards-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .prompts-list, .rewards-list {
      flex: 1;
      overflow-y: auto;
    }
    .prompt-item, .reward-item {
      display: flex;
      align-items: center;
      padding: 6px;
      border-bottom: 1px solid #555;
    }
    .prompt-item span, .reward-item span {
      flex: 1;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .prompt-item input[type="text"], .reward-item input[type="text"] {
      flex: 1;
      padding: 3px;
      font-size: 0.9rem;
      border: 1px solid #555;
      border-radius: 3px;
      background-color: #444;
      color: #fff;
    }
    .prompt-item input[type="checkbox"] {
      margin-right: 5px;
    }
    .prompt-item label {
      font-size: 0.75rem;
      color: #ccc;
      margin-right: 10px;
    }
    .prompt-item button, .reward-item button {
      background-color: #555;
      color: #fff;
      border: none;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .prompt-item button:hover, .reward-item button:hover {
      background-color: #666;
    }
    .prompt-item.important span {
      color: #28a745;
    }
    .notes-input {
      width: 100%;
      padding: 6px;
      font-size: 0.85rem;
      border: 1px solid #555;
      border-radius: 3px;
      box-sizing: border-box;
      background-color: #222;
      color: #fff;
    }
    /* Confirmation Dialog Styles */
    .confirmation-dialog {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .confirmation-dialog.active {
      display: flex;
    }
    .confirmation-box {
      background-color: #333;
      padding: 20px;
      border-radius: 5px;
      text-align: center;
      color: #fff;
      max-width: 300px;
      width: 80%;
    }
    .confirmation-box p {
      margin: 0 0 20px 0;
      font-size: 1rem;
    }
    .confirmation-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    .confirmation-buttons button {
      background-color: #444;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .confirmation-buttons button:hover {
      background-color: #555;
    }
    .confirmation-buttons .yes-btn {
      background-color: #d9534f;
    }
    .confirmation-buttons .yes-btn:hover {
      background-color: #c9302c;
    }
    @media (max-width: 393px) {
      body {
        font-size: 13px;
      }
      .header {
        padding: 8px 12px;
        font-size: 1rem;
      }
      .header .category-container {
        gap: 16px;
      }
      .header button {
        font-size: 1.3rem;
        padding: 4px 6px;
      }
      .header .category-input {
        font-size: 0.9rem;
        width: 160px;
      }
      .tabs {
        padding: 5px 0;
      }
      .tab {
        padding: 5px 8px;
        font-size: 0.8rem;
        min-width: 50px;
      }
      .tab-content {
        padding: 8px;
      }
      .pb-details, .prompts-header, .rewards-header {
        font-size: 0.75rem;
        gap: 5px;
      }
      .pb-details {
        flex-wrap: nowrap;
        gap: 5px;
      }
      .pb-controls button, .prompts-header button, .rewards-header button {
        padding: 5px 10px;
        font-size: 0.8rem;
      }
      .timer-container {
        width: 130px;
        height: 130px;
      }
      .timer-display {
        font-size: 1.4rem;
      }
      .task-header, .prompts-header, .rewards-header {
        padding: 6px;
      }
      .task-header .fields {
        gap: 2px;
      }
      .task-header input, .prompts-header input, .rewards-header input {
        font-size: 0.7rem;
        padding: 2px;
        width: 75px;
        height: 22px;
      }
      textarea {
        font-size: 0.8rem;
        padding: 5px;
      }
      .prompt-item, .reward-item {
        padding: 5px;
      }
      .prompt-item span, .reward-item span {
        font-size: 0.85rem;
      }
      .prompt-item input[type="text"], .reward-item input[type="text"] {
        font-size: 0.85rem;
      }
      .prompt-item label {
        font-size: 0.7rem;
      }
      .prompt-item button, .reward-item button {
        padding: 3px 6px;
        font-size: 0.7rem;
      }
      .confirmation-box {
        padding: 15px;
      }
      .confirmation-box p {
        font-size: 0.9rem;
      }
      .confirmation-buttons button {
        padding: 6px 12px;
        font-size: 0.8rem;
      }
      .notes-input {
        font-size: 0.8rem;
        padding: 5px;
      }
    }
  </style>
</head>
<body>
  <!-- Confirmation Dialog -->
  <div class="confirmation-dialog" id="confirmationDialog">
    <div class="confirmation-box">
      <p id="confirmationMessage"></p>
      <div class="confirmation-buttons">
        <button class="yes-btn" onclick="confirmDeleteCategory(true)">Yes</button>
        <button onclick="confirmDeleteCategory(false)">No</button>
      </div>
    </div>
  </div>

  <div class="header">
    <div class="category-container">
      <button onclick="removeCategory()">-</button>
      <span id="category-header" class="category-name">Music Practice</span>
      <button onclick="addCategory()">+</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab" onclick="showTab('tasks')">Tasks</div>
    <div class="tab" onclick="showTab('pb')">Pomo</div>
    <div class="tab" onclick="showTab('prompts')">Prompts</div>
    <div class="tab active" onclick="showTab('notes')">Notes</div>
    <div class="tab" onclick="showTab('summary')">Summary</div>
    <div class="tab" onclick="showTab('rewards')">Rewards</div>
  </div>
  <div id="tasks" class="tab-content">
    <div class="task-header">
      <div class="fields">
        <div class="field">
          <label for="stage">Stage</label>
          <input id="stage" type="text" value="Scales">
        </div>
        <div class="field">
          <label for="date">Date</label>
          <input id="date" type="text" readonly>
        </div>
        <div class="field">
          <label for="due">Due</label>
          <input id="due" type="text" value="TBC">
        </div>
        <div class="field">
          <label for="task-time">Time</label>
          <input id="task-time" type="text" placeholder="e.g., 1:30:00 or 30 min">
        </div>
      </div>
    </div>
    <textarea id="task-notes" placeholder="Write your notes here..."></textarea>
  </div>
  <div id="pb" class="tab-content">
    <div class="pb-details">
      <div>Stage: <span id="pb-stage"></span></div>
      <div>Date: <span id="pb-date"></span></div>
      <div>Due: <span id="pb-due"></span></div>
      <div>Time: <span id="pb-time"></span></div>
    </div>
    <div class="pb-controls">
      <button id="start-pause-btn" onclick="toggleStartPause()">Start</button>
      <button onclick="completeTimer()">Complete</button>
      <button onclick="resetTimer()">Reset</button>
    </div>
    <div class="pb-timer">
      <div class="timer-container">
        <svg width="100%" height="100%" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet" class="timer-circle">
          <circle class="timer-circle-bg" cx="100" cy="100" r="95"/>
          <circle id="timer-circle-progress" class="timer-circle-progress" cx="100" cy="100" r="95" stroke-dasharray="596.9" stroke-dashoffset="0"/>
        </svg>
        <div id="pb-timer" class="timer-display">00:00:00</div>
      </div>
    </div>
  </div>
  <div id="prompts" class="tab-content">
    <div class="prompts-header">
      <div>
        <label for="refresh-interval">Refresh Interval (MM:SS)</label>
        <input id="refresh-interval" type="text" value="00:10">
      </div>
      <button onclick="showAddPromptInput()">Add Prompt</button>
    </div>
    <div class="prompts-list" id="prompts-list">
      <div class="prompt-item important">
        <span ondblclick="editPrompt(this)">PAY PARKING FINE!!!</span>
        <input type="checkbox" id="important-1" checked onchange="toggleImportant(this)">
        <label for="important-1">Important</label>
        <button onclick="deletePrompt(this)">Delete</button>
      </div>
      <div class="prompt-item">
        <span ondblclick="editPrompt(this)">Get milk</span>
        <input type="checkbox" id="important-2" onchange="toggleImportant(this)">
        <label for="important-2">Important</label>
        <button onclick="deletePrompt(this)">Delete</button>
      </div>
      <div class="prompt-item">
        <span ondblclick="editPrompt(this)">Breathe</span>
        <input type="checkbox" id="important-3" onchange="toggleImportant(this)">
        <label for="important-3">Important</label>
        <button onclick="deletePrompt(this)">Delete</button>
      </div>
      <div class="prompt-item important">
        <span ondblclick="editPrompt(this)">2pm Mtg!!!</span>
        <input type="checkbox" id="important-4" checked onchange="toggleImportant(this)">
        <label for="important-4">Important</label>
        <button onclick="deletePrompt(this)">Delete</button>
      </div>
    </div>
  </div>
  <div id="notes" class="tab-content active">
    <input type="text" class="notes-input" placeholder="Enter your
